<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="SATARK AI — India's premier AI-powered citizen cyber-fraud response platform. Instant analysis, real-time protection." />
  <meta name="theme-color" content="#030712" />
  <title>SATARK AI — Cyber Fraud Intelligence Platform</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap');

    :root {
      /* Core palette */
      --bg-void: #020408;
      --bg-deep: #040810;
      --bg-mid: #080e1a;
      --bg-surface: #0c1424;
      --bg-elevated: #111c30;
      --bg-card: rgba(12, 20, 36, 0.85);

      /* Glass layers */
      --glass-1: rgba(255, 255, 255, 0.03);
      --glass-2: rgba(255, 255, 255, 0.055);
      --glass-3: rgba(255, 255, 255, 0.08);

      /* Borders */
      --border: rgba(255, 255, 255, 0.07);
      --border-mid: rgba(255, 255, 255, 0.11);
      --border-hover: rgba(255, 255, 255, 0.18);
      --border-glow: rgba(0, 210, 160, 0.35);

      /* Text */
      --text: #eef2f8;
      --text-muted: #7a8aa8;
      --text-faint: #3d4f6a;
      --text-accent: #00d2a0;

      /* Brand — electric teal-green */
      --brand: #00d2a0;
      --brand-mid: #00b88c;
      --brand-deep: #009474;
      --brand-glow: rgba(0, 210, 160, 0.18);
      --brand-glow-strong: rgba(0, 210, 160, 0.35);

      /* Secondary accent — electric blue */
      --accent: #3b82f6;
      --accent-glow: rgba(59, 130, 246, 0.2);

      /* Status colors */
      --status-safe: #00d2a0;
      --status-warn: #f59e0b;
      --status-danger: #ef4444;
      --status-info: #3b82f6;

      /* Bubble surfaces */
      --user-bubble-bg: rgba(0, 210, 160, 0.06);
      --user-bubble-border: rgba(0, 210, 160, 0.2);
      --bot-bubble-bg: rgba(12, 20, 36, 0.92);
      --bot-bubble-border: rgba(255, 255, 255, 0.07);

      /* Chip states */
      --chip-run: #3b82f6;
      --chip-done: #00d2a0;
      --chip-failed: #ef4444;
      --chip-idle: #2d3f5a;

      /* Dimensions */
      --radius-sm: 8px;
      --radius: 12px;
      --radius-md: 14px;
      --radius-lg: 18px;
      --radius-xl: 24px;

      /* Shadows */
      --shadow-sm: 0 2px 12px rgba(0, 0, 0, 0.35);
      --shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
      --shadow-lg: 0 8px 60px rgba(0, 0, 0, 0.7);
      --shadow-brand: 0 0 0 1px var(--border-glow), 0 4px 24px rgba(0, 210, 160, 0.12);
      --glow-ring: 0 0 0 2px rgba(0, 210, 160, 0.15);
    }

    *, *::before, *::after {
      box-sizing: border-box;
    }

    * {
      transition:
        border-color 0.18s ease,
        background-color 0.18s ease,
        box-shadow 0.18s ease,
        opacity 0.18s ease;
    }

    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: 'Inter', 'Space Grotesk', system-ui, sans-serif;
      color: var(--text);
      background: var(--bg-void);
    }

    body {
      overscroll-behavior: none;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── Background orbs ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 800px 600px at 0% 0%, rgba(0, 210, 160, 0.06) 0%, transparent 60%),
        radial-gradient(ellipse 600px 500px at 100% 100%, rgba(59, 130, 246, 0.05) 0%, transparent 55%),
        radial-gradient(ellipse 400px 300px at 50% 50%, rgba(0, 210, 160, 0.025) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Animated noise texture ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    /* ── Layout ── */
    .app {
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      height: 100dvh;
      overflow: hidden;
      position: relative;
      z-index: 1;
    }

    /* ═══════════════════════════════════
       SIDEBAR
    ═══════════════════════════════════ */
    .sidebar {
      background: linear-gradient(180deg, var(--bg-mid) 0%, var(--bg-void) 100%);
      border-right: 1px solid var(--border);
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 20;
      min-height: 0;
      overflow: hidden;
      position: relative;
    }

    /* Sidebar glow line */
    .sidebar::after {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 1px;
      background: linear-gradient(180deg, transparent 0%, var(--brand) 40%, transparent 100%);
      opacity: 0.25;
    }

    /* ── Brand ── */
    .brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 14px 14px;
      border: 1px solid var(--border-mid);
      border-radius: var(--radius-md);
      background: var(--glass-1);
      backdrop-filter: blur(20px);
      position: relative;
      overflow: hidden;
    }

    .brand::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--brand), transparent);
      opacity: 0.4;
    }

    .brand-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-icon {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      background: linear-gradient(135deg, var(--brand), #0097b2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      box-shadow: 0 0 20px rgba(0, 210, 160, 0.3);
    }

    .brand h1 {
      margin: 0;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #fff;
      line-height: 1.1;
    }

    .brand small {
      color: var(--text-muted);
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      display: block;
      margin-top: 2px;
    }

    .mode-pill {
      border-radius: 999px;
      border: 1px solid var(--border-glow);
      padding: 4px 9px;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--brand);
      background: var(--brand-glow);
      white-space: nowrap;
    }

    /* ── New Chat Button ── */
    .new-chat {
      border: 1px solid var(--border-glow);
      border-radius: var(--radius);
      padding: 11px 14px;
      font-weight: 600;
      color: var(--bg-void);
      background: linear-gradient(90deg, var(--brand), #00b8d4);
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
      transform: translateY(0);
      box-shadow: 0 4px 16px rgba(0, 210, 160, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .new-chat:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(0, 210, 160, 0.35);
      background: linear-gradient(90deg, #00e4ae, #00cce8);
    }

    .new-chat:active {
      transform: translateY(0);
      box-shadow: 0 2px 8px rgba(0, 210, 160, 0.15);
    }

    /* ── Search ── */
    .search-wrap {
      position: relative;
    }

    .search-wrap input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--glass-1);
      color: var(--text);
      padding: 9px 12px 9px 32px;
      outline: none;
      font-size: 12px;
      font-family: inherit;
    }

    .search-wrap input:focus {
      border-color: var(--border-glow);
      background: var(--glass-2);
      box-shadow: 0 0 0 2px rgba(0, 210, 160, 0.1);
    }

    .search-wrap::before {
      content: '⌕';
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-faint);
      font-size: 14px;
      pointer-events: none;
    }

    /* ── History ── */
    .history {
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding-right: 2px;
      min-height: 0;
      flex: 1 1 auto;
    }

    .history::-webkit-scrollbar { width: 3px; }
    .history::-webkit-scrollbar-track { background: transparent; }
    .history::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 9px; }

    .chat-item {
      border: 1px solid transparent;
      border-radius: var(--radius);
      background: transparent;
      padding: 10px 12px;
      cursor: pointer;
      text-align: left;
      color: inherit;
      width: 100%;
      position: relative;
      overflow: hidden;
    }

    .chat-item:hover {
      border-color: var(--border);
      background: var(--glass-1);
    }

    .chat-item.active {
      border-color: var(--border-glow);
      background: rgba(0, 210, 160, 0.05);
    }

    .chat-item.active::before {
      content: '';
      position: absolute;
      left: 0;
      top: 15%;
      bottom: 15%;
      width: 2px;
      background: var(--brand);
      border-radius: 0 2px 2px 0;
    }

    .chat-item .title {
      margin: 0;
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }

    .chat-item .meta {
      margin: 3px 0 0;
      font-size: 10px;
      color: var(--text-faint);
    }

    .chat-item .snippet {
      margin: 4px 0 0;
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Profile ── */
    .profile {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      background: var(--glass-1);
    }

    .profile-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--brand), #0097b2);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: var(--bg-void);
      margin-bottom: 8px;
    }

    .profile-name {
      margin: 0;
      font-weight: 600;
      font-size: 12px;
    }

    .profile-email {
      margin: 2px 0 8px;
      font-size: 10px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .profile-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .ghost-btn,
    .profile-actions button,
    .profile-actions a {
      border: 1px solid var(--border-mid);
      border-radius: var(--radius-sm);
      background: var(--glass-2);
      color: var(--text);
      padding: 6px 10px;
      font-size: 11px;
      font-family: inherit;
      text-decoration: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .ghost-btn:hover,
    .profile-actions button:hover,
    .profile-actions a:hover {
      border-color: var(--border-hover);
      background: var(--glass-3);
    }

    /* ═══════════════════════════════════
       MAIN AREA
    ═══════════════════════════════════ */
    .main {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      min-height: 0;
      overflow: hidden;
      position: relative;
    }

    /* ── Topbar ── */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 0 20px;
      height: 56px;
      border-bottom: 1px solid var(--border);
      background: rgba(4, 8, 16, 0.7);
      backdrop-filter: blur(20px);
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }

    .topbar::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, var(--brand) 40%, var(--accent) 70%, transparent 100%);
      opacity: 0.15;
    }

    .top-left {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 14px;
      letter-spacing: 0.01em;
    }

    .menu-btn {
      display: none;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--glass-2);
      color: var(--text);
      padding: 6px 10px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
    }

    .topbar-status {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--text-muted);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--brand);
      box-shadow: 0 0 6px var(--brand);
      animation: statusPulse 2s ease-in-out infinite;
    }

    @keyframes statusPulse {
      0%, 100% { opacity: 0.8; box-shadow: 0 0 4px var(--brand); }
      50% { opacity: 1; box-shadow: 0 0 10px var(--brand); }
    }

    .topbar-version {
      font-size: 10px;
      color: var(--text-faint);
      font-family: 'Space Grotesk', monospace;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 6px;
    }

    /* ── Thread ── */
    .thread-wrap {
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      justify-content: center;
      overflow-y: auto;
      overflow-x: hidden;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
      padding: 24px 16px 16px;
      position: relative;
    }

    .thread-wrap::-webkit-scrollbar { width: 4px; }
    .thread-wrap::-webkit-scrollbar-track { background: transparent; }
    .thread-wrap::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 9px; }

    .thread {
      width: min(900px, 100%);
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding-bottom: 24px;
    }

    /* ── Hero Empty State ── */
    .starter {
      border: 1px solid var(--border-mid);
      border-radius: var(--radius-xl);
      background: var(--bg-card);
      backdrop-filter: blur(24px);
      padding: 0;
      overflow: hidden;
      position: relative;
    }

    .starter::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent 5%, var(--brand) 40%, var(--accent) 70%, transparent 95%);
      opacity: 0.4;
    }

    .starter-hero {
      padding: 32px 32px 24px;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }

    .starter-logo {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--brand), #0097b2);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 16px;
      box-shadow: 0 0 32px rgba(0, 210, 160, 0.35);
      animation: logoFloat 4s ease-in-out infinite;
    }

    @keyframes logoFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    .starter-hero h2 {
      margin: 0 0 8px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(90deg, #fff 0%, var(--brand) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .starter-hero p {
      margin: 0;
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.5;
      max-width: 440px;
      margin: 0 auto;
    }

    .starter-features {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0;
    }

    .starter-feature {
      padding: 20px 20px;
      border-right: 1px solid var(--border);
      position: relative;
    }

    .starter-feature:last-child {
      border-right: none;
    }

    .starter-feature-icon {
      font-size: 20px;
      margin-bottom: 8px;
    }

    .starter-feature h3 {
      margin: 0 0 4px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    .starter-feature p {
      margin: 0;
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.45;
    }

    .starter-prompts {
      padding: 16px 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .starter-prompt-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-faint);
      margin-bottom: 4px;
    }

    .starter-prompt-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .prompt-chip {
      border: 1px solid var(--border-mid);
      border-radius: 999px;
      padding: 7px 13px;
      font-size: 12px;
      color: var(--text-muted);
      background: var(--glass-1);
      cursor: pointer;
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .prompt-chip:hover {
      border-color: var(--border-glow);
      background: var(--brand-glow);
      color: var(--text-accent);
      box-shadow: 0 0 12px rgba(0, 210, 160, 0.1);
    }

    /* ── Messages ── */
    .msg {
      display: flex;
      gap: 12px;
      width: 100%;
      animation: msgSlideIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes msgSlideIn {
      from { transform: translateY(8px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .msg.user {
      justify-content: flex-end;
    }

    .bubble {
      max-width: min(760px, 94%);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      overflow: hidden;
      backdrop-filter: blur(8px);
    }

    .bubble-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 8px 14px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.02em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
    }

    .bubble.user {
      background: var(--user-bubble-bg);
      border-color: var(--user-bubble-border);
    }

    .bubble.user .bubble-head {
      border-bottom-color: rgba(0, 210, 160, 0.12);
    }

    .bubble.bot {
      background: var(--bot-bubble-bg);
      border-color: var(--bot-bubble-border);
    }

    .bubble-body {
      padding: 14px 16px;
      line-height: 1.65;
      font-size: 14px;
    }

    .bubble-body p {
      margin: 0 0 10px;
    }

    .bubble-body p:last-child {
      margin-bottom: 0;
    }

    .bubble-body a {
      color: #5ac8fa;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    /* ── Assistant steps ── */
    .assistant-steps {
      margin: 12px 0 0;
      padding-left: 20px;
      display: grid;
      gap: 6px;
      font-size: 13px;
      color: #c8e4ff;
    }

    /* ── Flags ── */
    .assistant-flags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .flag {
      border-radius: 999px;
      padding: 3px 10px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .flag.warn {
      background: rgba(245, 158, 11, 0.12);
      border: 1px solid rgba(245, 158, 11, 0.35);
      color: #fcd34d;
    }

    .flag.danger {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
    }

    .flag.safe {
      background: rgba(0, 210, 160, 0.08);
      border: 1px solid rgba(0, 210, 160, 0.25);
      color: var(--brand);
    }

    /* ── Integration Panel ── */
    .integration-panel {
      margin-top: 12px;
      border: 1px solid rgba(0, 210, 160, 0.2);
      border-radius: var(--radius);
      background: rgba(0, 20, 38, 0.7);
      padding: 12px;
    }

    .integration-panel-head {
      margin: 0 0 8px;
      font-size: 11px;
      color: var(--text-accent);
      font-weight: 600;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .integration-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .integration-item {
      border: 1px solid rgba(0, 210, 160, 0.15);
      border-radius: var(--radius-sm);
      padding: 8px;
      background: rgba(0, 16, 30, 0.8);
    }

    .integration-item-title {
      margin: 0 0 4px;
      font-size: 11px;
      color: #d6ebff;
      font-weight: 600;
    }

    .integration-item-status {
      margin: 0;
      font-size: 11px;
      color: #9dc3df;
    }

    .integration-item-status.ok {
      color: var(--status-safe);
    }

    .integration-item-status.warn {
      color: var(--status-warn);
    }

    .integration-links {
      margin-top: 8px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .integration-link {
      border: 1px solid rgba(0, 210, 160, 0.25);
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 11px;
      color: var(--text-accent);
      background: rgba(0, 210, 160, 0.06);
      text-decoration: none;
    }

    .integration-link:hover {
      border-color: rgba(0, 210, 160, 0.5);
      background: rgba(0, 210, 160, 0.12);
    }

    @media (max-width: 620px) {
      .integration-grid {
        grid-template-columns: 1fr;
      }
    }

    /* ── Clarification Flow ── */
    .clarification-wrap {
      margin-top: 12px;
      padding: 14px;
      border: 1px solid rgba(0, 210, 160, 0.2);
      border-radius: var(--radius);
      background: rgba(0, 18, 34, 0.85);
      position: relative;
      overflow: hidden;
    }

    .clarification-wrap::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--brand), transparent);
      opacity: 0.35;
    }

    .clarification-question {
      margin: 0 0 6px;
      font-size: 13px;
      font-weight: 600;
      color: #e7f4ff;
    }

    .clarification-why {
      margin: 0 0 10px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .clarification-options {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .clarification-btn {
      border: 1px solid rgba(0, 210, 160, 0.25);
      border-radius: 999px;
      background: rgba(0, 210, 160, 0.06);
      color: var(--text);
      padding: 7px 14px;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
    }

    .clarification-btn:hover {
      border-color: rgba(0, 210, 160, 0.5);
      background: rgba(0, 210, 160, 0.12);
    }

    .clarification-btn.selected {
      border-color: var(--brand);
      background: rgba(0, 210, 160, 0.15);
      color: var(--brand);
    }

    .clarification-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .clarification-selected {
      margin: 0 0 8px;
      font-size: 12px;
      color: var(--brand);
    }

    .clarification-pending {
      margin-top: 10px;
      padding: 10px;
      border: 1px solid rgba(0, 210, 160, 0.15);
      border-radius: var(--radius-sm);
      background: rgba(0, 14, 28, 0.88);
    }

    .clarification-pending-bar {
      position: relative;
      overflow: hidden;
      height: 3px;
      border-radius: 999px;
      background: rgba(0, 210, 160, 0.12);
    }

    .clarification-pending-bar::before {
      content: '';
      position: absolute;
      inset: 0;
      transform: translateX(-100%);
      background: linear-gradient(90deg, transparent, var(--brand), transparent);
      animation: clarificationShimmer 1.2s linear infinite;
    }

    .clarification-pending-text {
      margin: 8px 0 0;
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .clarification-pending-text::after {
      content: '';
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--brand);
      box-shadow: 10px 0 0 rgba(0, 210, 160, 0.6), 20px 0 0 rgba(0, 210, 160, 0.35);
      animation: clarificationDots 1s ease-in-out infinite;
    }

    .clarification-reasoning {
      margin-top: 10px;
    }

    @keyframes clarificationShimmer {
      100% { transform: translateX(100%); }
    }

    @keyframes clarificationDots {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    /* ── Jump to Latest ── */
    .jump-latest-btn {
      position: absolute;
      right: 18px;
      bottom: 14px;
      border: 1px solid var(--border-glow);
      border-radius: 999px;
      background: rgba(4, 10, 22, 0.94);
      backdrop-filter: blur(12px);
      color: var(--text-accent);
      padding: 7px 14px;
      font-size: 11px;
      font-family: inherit;
      cursor: pointer;
      display: none;
      z-index: 5;
      box-shadow: 0 4px 20px rgba(0, 210, 160, 0.15);
    }

    .jump-latest-btn.visible {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    /* ── Agent Strip ── */
    .agent-strip {
      width: min(900px, 100%);
      margin: 0 auto;
      padding: 0 16px;
    }

    .agent-strip-inner {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: rgba(4, 8, 20, 0.88);
      backdrop-filter: blur(12px);
      padding: 10px 12px;
      display: none;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .agent-chip {
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 11px;
      padding: 4px 10px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(8, 16, 32, 0.7);
      font-family: inherit;
    }

    .agent-dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: var(--chip-idle);
    }

    .agent-chip.running {
      border-color: rgba(59, 130, 246, 0.3);
      background: rgba(59, 130, 246, 0.06);
    }

    .agent-chip.running .agent-dot {
      background: var(--chip-run);
      box-shadow: 0 0 8px rgba(59, 130, 246, 0.7);
      animation: agentPulse 1s ease-in-out infinite;
    }

    @keyframes agentPulse {
      0%, 100% { box-shadow: 0 0 4px rgba(59, 130, 246, 0.5); }
      50% { box-shadow: 0 0 12px rgba(59, 130, 246, 0.9); }
    }

    .agent-chip.done .agent-dot {
      background: var(--chip-done);
      box-shadow: 0 0 6px rgba(0, 210, 160, 0.5);
    }

    .agent-chip.failed .agent-dot {
      background: var(--chip-failed);
    }

    /* ── Composer ── */
    .composer-wrap {
      border-top: 1px solid var(--border);
      background: rgba(2, 6, 12, 0.88);
      backdrop-filter: blur(24px);
      padding: 14px 16px;
      flex-shrink: 0;
    }

    .composer {
      width: min(900px, 100%);
      margin: 0 auto;
      border: 1px solid var(--border-mid);
      border-radius: var(--radius-lg);
      background: rgba(8, 16, 32, 0.8);
      padding: 12px 14px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;

    .composer:focus-within {

      box-shadow: 0 0 0 3px rgba(0, 210, 160, 0.08), 0 4px 20px rgba(0, 0, 0, 0.4);

    .composer textarea {
      border: 0;
      outline: none;
      resize: none;
      background: transparent;
      color: var(--text);
      min-height: 48px;
      max-height: 180px;
      font: inherit;
      font-size: 14px;
      line-height: 1.5;
    }

    .composer textarea::placeholder {
      color: var(--text-faint);
    }

    .composer-actions {
      display: flex;
      align-items: flex-end;
      gap: 6px;
    }

    .icon-btn {
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--glass-2);
      color: var(--text-muted);
      padding: 8px 12px;
      cursor: pointer;
      font-weight: 500;
      font-size: 12px;
      font-family: inherit;
    }

    .icon-btn:hover {
      border-color: var(--border-hover);
      background: var(--glass-3);
      color: var(--text);
    }

    .icon-btn.active {
      border-color: var(--border-glow);
      color: var(--brand);
      background: var(--brand-glow);
      box-shadow: 0 0 10px rgba(0, 210, 160, 0.15);
    }

    .send-btn {
      background: linear-gradient(135deg, var(--brand), #00b4cc);
      color: var(--bg-void);
      border: 0;
      min-width: 72px;
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      font-weight: 700;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0, 210, 160, 0.2);
    }

    .send-btn:hover {
      background: linear-gradient(135deg, #00e4ae, #00cce8);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(0, 210, 160, 0.35);
    }

    .send-btn:active {
      transform: translateY(0);
      box-shadow: 0 2px 8px rgba(0, 210, 160, 0.15);
    }

    .composer-meta {
      width: min(900px, 100%);
      margin: 8px auto 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      color: var(--text-faint);
      font-size: 10px;
    }

    .attachment-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 4px 12px;
      background: var(--glass-2);
      max-width: 100%;
    }

    .attachment-pill span {
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .attachment-pill button {
      border: 0;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0;
      font-size: 12px;
      font-family: inherit;
    }

    .msg-attachments {
      margin-top: 10px;
      display: grid;
      gap: 8px;
    }

    .msg-attachment-card {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: rgba(4, 12, 26, 0.8);
      padding: 10px;
      display: block;
    }

    .msg-attachment-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .msg-attachment-preview {
      width: 100%;
      max-width: 280px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      display: block;
      object-fit: cover;
      margin-bottom: 8px;
    }

    .msg-attachment-meta {
      min-width: 0;
    }

    .msg-attachment-name {
      margin: 0;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .msg-attachment-sub {
      margin: 3px 0 0;
      font-size: 11px;
      color: var(--text-muted);
    }

    .attachment-badge {
      border-radius: 999px;
      border: 1px solid var(--border);
      padding: 3px 8px;
      font-size: 10px;
      letter-spacing: 0.04em;
      color: var(--text-muted);
      text-transform: uppercase;
      white-space: nowrap;
    }

    .msg-meta-note {
      margin: 8px 0 0;
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.4;
    }

    /* ── Stage Meta Strip ── */
    .stage-meta-strip {
      margin-top: 8px;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: rgba(4, 12, 26, 0.7);
      font-size: 11px;
      color: var(--text-muted);
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .stage-chip {
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 10px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    /* ── Deep Action ── */
    .deep-action-wrap {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .deep-action-btn {
      border: 1px solid rgba(0, 210, 160, 0.3);
      border-radius: 999px;
      background: rgba(0, 210, 160, 0.06);
      color: var(--text-accent);
      padding: 7px 14px;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
    }

    .deep-action-btn:hover {
      border-color: rgba(0, 210, 160, 0.55);
      background: rgba(0, 210, 160, 0.12);
    }

    .deep-action-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ── Technical Details ── */
    .msg-technical-details {
      margin-top: 10px;
      border-top: 1px solid var(--border);
      padding-top: 8px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .msg-technical-details summary {
      cursor: pointer;
      color: #6ba4dc;
      font-size: 12px;
    }

    .msg-technical-details ul {
      margin: 8px 0 0 16px;
      padding: 0;
      display: grid;
      gap: 4px;
    }

    /* ── Drawer toggle ── */
    .drawer-toggle {
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--glass-1);
      color: var(--text-muted);
      padding: 6px 10px;
      font-size: 11px;
      font-family: inherit;
      cursor: pointer;
      display: none;
    }

    /* ── Analyst Drawer ── */
    .drawer {
      position: fixed;
      right: 12px;
      top: 66px;
      width: min(390px, calc(100vw - 24px));
      max-height: calc(100vh - 80px);
      overflow: auto;
      border: 1px solid var(--border-mid);
      border-radius: var(--radius-lg);
      background: rgba(4, 10, 22, 0.97);
      backdrop-filter: blur(24px);
      box-shadow: var(--shadow-lg);
      padding: 14px;
      z-index: 40;
      display: none;
    }

    .drawer.visible {
      display: block;
    }

    .drawer h3 {
      margin: 0 0 8px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      color: var(--text-accent);
    }

    .drawer pre {
      margin: 0;
      white-space: pre-wrap;
      font-size: 11px;
      line-height: 1.4;
      color: var(--text-muted);
    }

    /* ── Overlay ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      z-index: 15;
    }

    /* ── Upload Toast ── */
    .upload-toast {
      position: fixed;
      left: 50%;
      bottom: 96px;
      transform: translate(-50%, 16px);
      border: 1px solid var(--border-glow);
      border-radius: 999px;
      background: rgba(4, 14, 30, 0.96);
      backdrop-filter: blur(16px);
      color: var(--text-accent);
      padding: 8px 16px;
      font-size: 12px;
      opacity: 0;
      pointer-events: none;
      z-index: 70;
    }

    .upload-toast.visible {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    /* ══════════════════════════════
       RESPONSIVE — MOBILE
    ══════════════════════════════ */
    @media (max-width: 900px) {
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        width: min(84vw, 320px);
        transform: translateX(-110%);
        transition: transform 0.22s cubic-bezier(0.22, 1, 0.36, 1);
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .menu-btn {
        display: inline-flex;
      }

      .overlay.visible {
        display: block;
      }

      .bubble {
        max-width: 96%;
      }

      .composer {
        grid-template-columns: 1fr;
      }

      .composer-actions {
        justify-content: flex-end;
      }

      .starter-features {
        grid-template-columns: 1fr;
      }

      .starter-feature {
        border-right: none;
        border-bottom: 1px solid var(--border);
      }

      .starter-feature:last-child {
        border-bottom: none;
      }
    }
  </style>
</head>
<body>
  <!-- Background animated glow orbs -->
  <div aria-hidden="true" style="position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden">
    <div style="position:absolute;top:-200px;left:-150px;width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,rgba(0,210,160,0.04) 0%,transparent 70%);animation:orbDrift1 18s ease-in-out infinite;"></div>

  </div>

    @keyframes orbDrift1 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(40px,30px) scale(1.1)} }
    @keyframes orbDrift2 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(-30px,-40px) scale(1.08)} }
  </style>

  <div class="overlay" id="overlay"></div>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-left">
          <div class="brand-icon">🛡️</div>
          <div>
            <small>Citizen Fraud Intelligence</small>

          </div>
        </div>
        <span class="mode-pill" id="leftModePill">Citizen</span>

    <main class="main">

          <span>SATARK Conversation</span>

  <script>
    const SESSION_STORAGE_KEY = 'satark_session_id';
    const ANALYST_MODE_KEY = 'satark_view_mode';

    const state = {

    const GEMINI_REPLY_INSTRUCTION = [
      'You are SATARK AI, a citizen cyber-fraud safety assistant.',
      'Write in clear IELTS 7 to 7.5 English.',
      'When user context is already clear, do not ask unnecessary follow-up questions.',
      'If context is missing, ask at most one concise yes/no clarification at a time.',
      'Do not escalate to emergency unless user indicates money loss or sensitive data exposure.',
      'Reply format is strict:',
      '1) Provide chat_reply in 2 to 4 natural sentences.',
      '2) Then provide summary as one short neutral sentence.',
      '3) Then provide exactly 3 to 4 bullet points of safety precautions or next steps.',
      '4) Use only available evidence from user text and uploaded files.',
      '5) Do not invent urgency unless evidence supports it.',
      '6) If an attachment exists, mention that attachment directly in chat_reply.',
      'Return structured fields for chat_reply, summary, and recommended_actions.',
    ].join('\n');

    const AGENT_ORDER = ['manager', 'scam_detector', 'osint', 'audio_analyzer', 'apk_analyzer', 'golden_hour', 'google_calendar', 'google_tasks', 'google_gmail', 'google_docs'];

    const AGENT_PROGRESS_HINTS = {
      manager: 'Booting manager...',
      apk_analyzer: 'Inspecting APK structure...',
      osint: 'Searching public references...',
      scam_detector: 'Analyzing scam indicators...',
      golden_hour: 'Preparing response plan...',
    };

    let uploadToastTimer = null;

    function getSessionId() {
      if (state.sessionId) return state.sessionId;
      const existing = localStorage.getItem(SESSION_STORAGE_KEY);
      if (existing && existing.length > 8) {
        state.sessionId = existing;
        return existing;
      }
      const random = Math.random().toString(36).slice(2) + Date.now().toString(36);
      state.sessionId = 'sess_' + random;
      localStorage.setItem(SESSION_STORAGE_KEY, state.sessionId);
      return state.sessionId;
    }

    function normalizeStage(value) {
      const raw = String(value || '').trim().toLowerCase();
      if (raw === 'analysis') return 'analysis';
      if (raw === 'deep') return 'deep';
      return 'triage';
    }

    function getDeepIdempotencyKey(sourceRunId) {
      const source = String(sourceRunId || '').trim();
      if (!source) return '';
      if (!state.deepIdempotencyBySource[source]) {
        state.deepIdempotencyBySource[source] = 'deep_' + source + '_' + Math.random().toString(36).slice(2, 10);
      }
      return state.deepIdempotencyBySource[source];
    }

    function isAnalystMode() {
      try {
        const params = new URLSearchParams(window.location.search || '');
        const explicit = String(params.get('view') || params.get('mode') || '').trim().toLowerCase();
        if (explicit === 'analyst' || explicit === 'debug') return true;
      } catch (_e) {}
      try {
        return String(localStorage.getItem(ANALYST_MODE_KEY) || '').trim().toLowerCase() === 'analyst';
      } catch (_e) {
        return false;
      }
    }

    function resolveDisplayName(profile) {
      const given = String(profile && profile.givenName ? profile.givenName : '').trim();
      const family = String(profile && profile.familyName ? profile.familyName : '').trim();
      const full = String(profile && profile.fullName ? profile.fullName : '').trim();
      const email = String(profile && profile.email ? profile.email : '').trim();

      const fullFromParts = [given, family].filter(Boolean).join(' ').trim();
      if (fullFromParts) return fullFromParts;
      if (full) return full;
      if (email) {
        const local = email.split('@')[0] || email;
        return local
          .split(/[._-]+/)
          .filter(Boolean)
          .map((part) => part.charAt(0).toUpperCase() + part.slice(1))
          .join(' ') || 'User';
      }
      return 'Guest';
    }

    function classifyAttachment(fileName, mimeType) {
      const n = String(fileName || '').toLowerCase();
      const m = String(mimeType || '').toLowerCase();
      if (n.endsWith('.apk') || m === 'application/vnd.android.package-archive') return 'apk';
      if (m.startsWith('image/')) return 'image';
      if (m.startsWith('audio/')) return 'audio';
      if (m.includes('pdf') || m.includes('text') || m.includes('document')) return 'document';
      return 'file';
    }

    function normalizeAttachment(file) {
      if (!file) return null;
      return {
        id: 'att_' + Math.random().toString(36).slice(2),
        name: String(file.name || 'attachment.bin'),
        mimeType: String(file.type || 'application/octet-stream'),
        size: Number(file.size || 0),
        category: classifyAttachment(file.name, file.type),
        previewState: 'processing',
        contentBase64: null,
        file,
      };
    }

    function primeAttachmentData(attachment) {
      if (!attachment || !attachment.file || attachment.contentBase64) return;
      attachment.previewState = 'processing';
      fileToDataUrl(attachment.file)
        .then((dataUrl) => {
          if (dataUrl) attachment.contentBase64 = String(dataUrl);
          attachment.previewState = 'ready';
          renderAttachment();
        })
        .catch(() => {
          attachment.previewState = 'ready';
          renderAttachment();
        });
    }

    function toAttachmentViewModel(att) {
      const mime = String(att.mimeType || '');
      const shouldEmbedInline = mime.startsWith('image/');
      return {
        id: att.id,
        name: att.name,
        mimeType: mime,
        size: att.size,
        category: att.category,
        previewState: att.previewState || 'ready',
        contentBase64: shouldEmbedInline ? String(att.contentBase64 || '') : '',
      };
    }

    function addSelectedFiles(fileList) {
      if (!fileList || !fileList.length) return;
      const incoming = Array.from(fileList)
        .map((f) => normalizeAttachment(f))
        .filter(Boolean);
      const seen = new Set(state.selectedFiles.map((x) => `${x.name}|${x.size}|${x.mimeType}`));
      const added = [];
      for (const item of incoming) {
        const key = `${item.name}|${item.size}|${item.mimeType}`;
        if (seen.has(key)) continue;
        seen.add(key);
        state.selectedFiles.push(item);
        added.push(item);
      }
      state.selectedFiles = state.selectedFiles.slice(0, 6);
      renderAttachment();
      for (const item of added) {
        primeAttachmentData(item);
      }
    }

    function showUploadToast(message) {
      const node = document.getElementById('uploadToast');
      if (!node) return;
      node.textContent = String(message || 'Attachment added');
      node.classList.add('visible');
      if (uploadToastTimer) clearTimeout(uploadToastTimer);
      uploadToastTimer = setTimeout(() => {
        node.classList.remove('visible');
      }, 1400);
    }

    function extractPastedFiles(e) {
      const out = [];
      const dt = e && e.clipboardData;
      if (!dt) return out;

      if (dt.files && dt.files.length) {
        for (const f of Array.from(dt.files)) {
          if (f && (String(f.type || '').startsWith('image/') || String(f.type || '') === 'application/pdf')) {
            out.push(f);
          }
        }
      }

      if (!out.length && dt.items && dt.items.length) {
        for (const item of Array.from(dt.items)) {
          if (item.kind !== 'file') continue;
          const f = item.getAsFile();
          if (!f) continue;
          if (String(f.type || '').startsWith('image/') || String(f.type || '') === 'application/pdf') {
            out.push(f);
          }
        }
      }

      return out;
    }

    async function handlePastedUpload(file) {
      if (!file) return;
      addSelectedFiles([file]);
      showUploadToast(String(file.type || '').startsWith('image/') ? 'Pasted image attached' : 'Pasted file attached');
      if (!state.isProcessing) {
        document.getElementById('composerHint').textContent = 'Attachment ready. Press Send to analyze.';
      }
    }

    function handlePasteUploadEvent(e) {
      if (!e || e.__satarkPasteHandled) return;
      const files = extractPastedFiles(e);
      if (!files.length) return;

      const active = document.activeElement;
      const typingInTextField =
        active &&
        (active.tagName === 'INPUT' ||
         active.tagName === 'TEXTAREA' ||
         active.isContentEditable);

      if (typingInTextField && !e.ctrlKey && !e.metaKey) return;

      e.__satarkPasteHandled = true;
      e.preventDefault();
      for (const file of files) {
        void handlePastedUpload(file);
      }
    }

    function removeSelectedFile(id) {
      state.selectedFiles = state.selectedFiles.filter((f) => f.id !== id);
      renderAttachment();
    }

    function storageKey() {
      const id = (state.profile.email || 'guest').toLowerCase();
      return 'satark_chat_history_' + encodeURIComponent(id);
    }

    function saveChats() {
      try {
        localStorage.setItem(storageKey(), JSON.stringify(state.chats));
      } catch (_e) {}
    }

    function loadChats() {
      state.deepIdempotencyBySource = {};
      state.deepRunBySource = {};
      try {
        const raw = localStorage.getItem(storageKey());
        state.chats = raw ? JSON.parse(raw) : [];
        if (!Array.isArray(state.chats)) state.chats = [];
      } catch (_e) {
        state.chats = [];
      }
      for (const chat of state.chats) {
        if (!chat || !Array.isArray(chat.messages)) continue;
        for (const message of chat.messages) {
          if (!message.id) message.id = nextMessageId();
          if (message.clarificationPending === undefined) message.clarificationPending = false;
          if (message.clarificationAnswered === undefined) message.clarificationAnswered = false;
          if (message.clarificationSelectedId === undefined) message.clarificationSelectedId = null;
          if (message.clarificationSelectedLabel === undefined) message.clarificationSelectedLabel = null;
          if (message.clarificationPendingPhase === undefined) message.clarificationPendingPhase = 0;
          if (message.clarificationPendingStartedAt === undefined) message.clarificationPendingStartedAt = null;
          if (message.analysisStage === undefined) message.analysisStage = null;
          if (message.caseId === undefined) message.caseId = null;
          if (message.sourceRunId === undefined) message.sourceRunId = null;
          if (message.contractVersion === undefined) message.contractVersion = null;
          if (message.analysisStageVersion === undefined) message.analysisStageVersion = null;
          if (message.deepReasonCode === undefined) message.deepReasonCode = null;
          if (message.eligibleForDeep === undefined) message.eligibleForDeep = false;
          if (message.deepRunId === undefined) message.deepRunId = null;
          if (message.deepRunState === undefined) message.deepRunState = null;
          if (message.idempotentReplay === undefined) message.idempotentReplay = false;

          const sourceRun = String(message.runId || '').trim();
          const deepRun = String(message.deepRunId || '').trim();
          if (sourceRun && deepRun) {
            state.deepRunBySource[sourceRun] = deepRun;
          }
          const stage = normalizeStage(message.analysisStage);
          if (stage === 'deep') {
            const src = String(message.sourceRunId || '').trim();
            const ownRun = String(message.runId || '').trim();
            if (src && ownRun) state.deepRunBySource[src] = ownRun;
          }
        }
      }
      if (!state.chats.length) {
        const starter = createChat('New SATARK chat');
        state.chats = [starter];
        state.activeChatId = starter.id;
        saveChats();
      }
      if (!state.activeChatId || !state.chats.some((c) => c.id === state.activeChatId)) {
        state.activeChatId = state.chats[0].id;
      }
    }

    function createChat(title) {
      const now = new Date().toISOString();
      return {
        id: 'chat_' + Math.random().toString(36).slice(2) + Date.now().toString(36),
        title: title || 'New chat',
        createdAt: now,
        updatedAt: now,
        messages: [],
      };
    }

    function getActiveChat() {
      return state.chats.find((c) => c.id === state.activeChatId) || null;
    }

    function updateChat(chat) {
      const idx = state.chats.findIndex((c) => c.id === chat.id);
      if (idx >= 0) state.chats[idx] = chat;
      chat.updatedAt = new Date().toISOString();
      state.chats.sort((a, b) => String(b.updatedAt).localeCompare(String(a.updatedAt)));
      saveChats();
    }

    function nextMessageId() {
      state.messageSeq += 1;
      return 'msg_' + Date.now().toString(36) + '_' + state.messageSeq.toString(36);
    }

    function updateMessageById(messageId, patch = {}) {
      const chat = getActiveChat();
      if (!chat) return false;
      const idx = (chat.messages || []).findIndex((m) => m && m.id === messageId);
      if (idx < 0) return false;
      chat.messages[idx] = {
        ...chat.messages[idx],
        ...patch,
      };
      updateChat(chat);
      render();
      return true;
    }

    function getMessageById(messageId) {
      const chat = getActiveChat();
      if (!chat) return null;
      return (chat.messages || []).find((m) => m && m.id === messageId) || null;
    }

    async function triggerDeepAnalysisForMessage(messageId) {
      if (!messageId || state.isProcessing) return;
      const target = getMessageById(messageId);
      if (!target) return;

      const sourceRunId = String(target.runId || '').trim();
      if (!sourceRunId) return;

      const caseId = String(target.caseId || '').trim() || null;
      const idempotencyKey = getDeepIdempotencyKey(sourceRunId);

      state.isProcessing = true;
      document.getElementById('composerHint').textContent = 'Starting deep analysis for this case...';
      updateMessageById(messageId, {
        deepRunState: 'running',
      });

      let deepMessageId = null;
      try {
        const res = await fetch('/api/analyze/deep', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Idempotency-Key': idempotencyKey,
          },
          body: JSON.stringify({
            source_run_id: sourceRunId,
            generate_report: true,
            trigger_mcp_actions: false,
            stream: true,
          }),
        });

        if (!res.ok) throw new Error('Could not start deep analysis');

        const ack = await res.json();
        const deepRunId = String(ack.run_id || '').trim();
        if (!deepRunId) throw new Error('Missing deep run id');

        state.deepRunBySource[sourceRunId] = deepRunId;
        updateMessageById(messageId, {
          deepRunId,
          deepRunState: 'running',
        });

        const replayed = Boolean(ack.idempotent_replay);
        const chat = getActiveChat();
        const existingDeep = replayed && chat
          ? (chat.messages || []).find((m) => m && String(m.runId || '').trim() === deepRunId && normalizeStage(m.analysisStage) === 'deep')
          : null;

        if (existingDeep && existingDeep.id) {
          deepMessageId = String(existingDeep.id);
          updateMessageById(deepMessageId, {
            text: 'Resuming an existing deep analysis run for this case.',
            flags: [{ text: 'Deep run resumed', level: 'warn' }],
            idempotentReplay: true,
            deepRunState: 'running',
          });
        } else {
          deepMessageId = addMessage(
            'assistant',
            replayed ? 'Resuming an existing deep analysis run for this case.' : 'Deep analysis started. I will post refined findings shortly.',
            {
              runId: deepRunId,
              caseId: String(ack.case_id || caseId || '').trim() || caseId,
              analysisStage: 'deep',
              sourceRunId,
              contractVersion: String(ack.contract_version || '').trim() || null,
              analysisStageVersion: Number(ack.analysis_stage_version || 0) || null,
              eligibleForDeep: false,
              deepReason: String(ack.deep_reason || 'Deep analysis accepted for this case.').trim(),
              deepReasonCode: String(ack.deep_reason_code || 'DEEP_ACCEPTED').trim(),
              idempotentReplay: replayed,
              flags: replayed ? [{ text: 'Deep run resumed', level: 'warn' }] : [{ text: 'Deep run started', level: 'warn' }],
              steps: [],
            },
          );
        }

        state.currentRunId = deepRunId;
        startStream(deepRunId);

        const result = await waitForResult(deepRunId);
        state.latestPayload = result;
        const assistant = buildAssistantPayload(result || {});

        if (!assistant.ok) {
          updateMessageById(String(deepMessageId || ''), {
            text: assistant.error || 'Deep analysis response is incomplete. Please retry.',
            flags: [{ text: 'Retry needed', level: 'warn' }],
            steps: [],
          });
        } else {
          updateMessageById(String(deepMessageId || ''), {
            text: assistant.text,
            steps: assistant.steps,
            flags: assistant.flags,
            confidenceNote: assistant.confidenceNote,
            evidenceNarrative: assistant.evidenceNarrative,
            uncertaintyNote: assistant.uncertaintyNote,
            technicalDetails: assistant.technicalDetails,
            clarification: assistant.clarification,
            runId: deepRunId,
            caseId: assistant.caseId,
            analysisStage: assistant.analysisStage,
            sourceRunId: assistant.sourceRunId || sourceRunId,
            contractVersion: assistant.contractVersion,
            analysisStageVersion: assistant.analysisStageVersion,
            eligibleForDeep: assistant.eligibleForDeep,
            deepReason: assistant.deepReason,
            deepReasonCode: assistant.deepReasonCode,
            deepAnalysisUrl: assistant.deepAnalysisUrl,
            integrationStatus: assistant.integrationStatus,
            idempotentReplay: replayed,
          });
        }

        updateMessageById(messageId, {
          deepRunState: 'done',
          deepRunId,
          eligibleForDeep: false,
          deepReason: 'Deep analysis completed for this case.',
          deepReasonCode: 'DEEP_ALREADY_EXECUTED',
        });
      } catch (_err) {
        updateMessageById(messageId, {
          deepRunState: 'failed',
        });
        if (deepMessageId) {
          updateMessageById(String(deepMessageId), {
            text: 'I could not start deep analysis right now. Please try again shortly.',
            flags: [{ text: 'Deep analysis unavailable', level: 'warn' }],
            steps: [],
          });
        } else {
          addMessage('assistant', 'I could not start deep analysis right now. Please try again shortly.');
        }
      } finally {
        state.isProcessing = false;
        document.getElementById('composerHint').textContent = 'Enter to send, Shift+Enter for new line';
        closeStreamAndPoll();
        render();
      }
    }

    function getClarificationPendingLabel(phase) {
      const labels = [
        'Reading screenshot',
        'Checking text in image',
        'Preparing next-step guidance',
      ];
      const idx = Math.max(0, Number(phase || 0)) % labels.length;
      return labels[idx];
    }

    function stopClarificationPulse() {
      if (!state.clarificationPulseTimer) return;
      clearInterval(state.clarificationPulseTimer);
      state.clarificationPulseTimer = null;
    }

    function startClarificationPulse(messageId) {
      stopClarificationPulse();
      state.clarificationPulseTimer = setInterval(() => {
        const chat = getActiveChat();
        if (!chat) {
          stopClarificationPulse();
          return;
        }
        const target = (chat.messages || []).find((m) => m && m.id === messageId);
        if (!target || !target.clarificationPending) {
          stopClarificationPulse();
          return;
        }
        updateMessageById(messageId, {
          clarificationPendingPhase: (Number(target.clarificationPendingPhase || 0) + 1) % 3,
        });
      }, 900);
    }

    function stopThinkingPulse() {
      if (!state.thinkingPulseTimer) return;
      clearInterval(state.thinkingPulseTimer);
      state.thinkingPulseTimer = null;
      state.thinkingMessageId = null;
    }

    function startThinkingPulse(messageId) {
      stopThinkingPulse();
      state.thinkingMessageId = messageId;
      const labels = [
        'SATARK AI is analyzing your case.',
        'SATARK AI is checking risk signals..',
        'SATARK AI is preparing next steps...',
      ];
      state.thinkingPulseTimer = setInterval(() => {
        const chat = getActiveChat();
        if (!chat) {
          stopThinkingPulse();
          return;
        }
        const target = (chat.messages || []).find((m) => m && m.id === messageId);
        if (!target) {
          stopThinkingPulse();
          return;
        }
        const phase = Number(target.clarificationPendingPhase || 0);
        updateMessageById(messageId, {
          text: labels[phase % labels.length],
          clarificationPendingPhase: (phase + 1) % labels.length,
        });
      }, 850);
    }

    function isNearThreadBottom() {
      const wrap = document.getElementById('threadWrap');
      if (!wrap) return true;
      const remaining = wrap.scrollHeight - (wrap.scrollTop + wrap.clientHeight);
      return remaining < 72;
    }

    function updateJumpToLatestButton() {
      const btn = document.getElementById('jumpToLatestBtn');
      if (!btn) return;
      btn.classList.toggle('visible', !state.followThread);
    }

    function scrollThreadToLatest(force = false) {
      const wrap = document.getElementById('threadWrap');
      if (!wrap) return;
      if (force || state.followThread) {
        wrap.scrollTop = wrap.scrollHeight;
        state.followThread = true;
      }
      updateJumpToLatestButton();
    }

    function formatTime(iso) {
      if (!iso) return '';
      try {
        return new Date(iso).toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
      } catch (_e) {
        return '';
      }
    }

    function textPreview(text, maxLen = 90) {
      const clean = String(text || '').replace(/\s+/g, ' ').trim();
      if (clean.length <= maxLen) return clean;
      return clean.slice(0, maxLen - 1) + '...';
    }

    function makeTitleFromText(text) {
      const src = String(text || '').toLowerCase();
      if (src.includes('kyc')) return 'Suspicious KYC SMS';
      if (src.includes('otp') && (src.includes('lost') || src.includes('debited'))) return 'OTP shared and money lost';
      if (src.includes('upi') && src.includes('lost')) return 'UPI money lost case';
      if (src.includes('lottery') || src.includes('prize')) return 'Lottery message check';
      if (src.includes('bank')) return 'Bank message check';
      const words = String(text || '').replace(/\s+/g, ' ').trim().split(' ').slice(0, 5).join(' ');
      return words ? words.charAt(0).toUpperCase() + words.slice(1) : 'New SATARK chat';
    }

    function sanitizeCitizenText(text) {
      let out = String(text || '').trim();
      if (!out) return out;
      out = out.replace(/\s{2,}/g, ' ').trim();
      return out;
    }

    function renderHistory() {
      const host = document.getElementById('historyList');
      host.innerHTML = '';
      const query = state.search.toLowerCase().trim();
      const items = state.chats.filter((chat) => {
        if (!query) return true;
        const blob = [chat.title, ...(chat.messages || []).map((m) => m.text || '')].join(' ').toLowerCase();
        return blob.includes(query);
      });

      if (!items.length) {
        const empty = document.createElement('div');
        empty.className = 'chat-item';
        empty.innerHTML = '<p class="title">No chats found</p><p class="meta">Try another keyword.</p>';
        host.appendChild(empty);
        return;
      }

      for (const chat of items) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'chat-item' + (chat.id === state.activeChatId ? ' active' : '');
        const last = (chat.messages || []).slice(-1)[0];
        btn.innerHTML = `
          <p class="title">${escapeHtml(chat.title || 'Untitled')}</p>
          <p class="meta">${escapeHtml(formatTime(chat.updatedAt || chat.createdAt))}</p>
          <p class="snippet">${escapeHtml(textPreview(last ? last.text : 'No messages yet'))}</p>
        `;
        btn.addEventListener('click', () => {
          state.activeChatId = chat.id;
          closeSidebarOnMobile();
          render();
        });
        host.appendChild(btn);
      }
    }

    function renderThread() {
      const thread = document.getElementById('thread');
      const chat = getActiveChat();
      thread.innerHTML = '';
      if (!chat || !chat.messages.length) {
        const starter = document.createElement('div');
        starter.className = 'starter';
        starter.innerHTML = `
          <div class="starter-hero">
            <div class="starter-logo">🛡️</div>
            <h2>SATARK AI — Your Cyber Safety Partner</h2>
            <p>India's most advanced AI platform for detecting digital fraud, scam SMS, suspicious apps, and phishing attacks in real-time.</p>
          </div>
          <div class="starter-features">
            <div class="starter-feature">
              <div class="starter-feature-icon">📸</div>
              <h3>Screenshot Analysis</h3>
              <p>Upload screenshots of suspicious messages, calls, or links for instant AI-powered fraud detection.</p>
            </div>
            <div class="starter-feature">
              <div class="starter-feature-icon">📱</div>
              <h3>APK Security Scan</h3>
              <p>Scan Android apps before installing. Our AI detects malware, data theft, and harmful permissions.</p>
            </div>
            <div class="starter-feature">
              <div class="starter-feature-icon">🔎</div>
              <h3>OSINT Intelligence</h3>
              <p>Cross-reference phone numbers, URLs, and identifiers against fraud databases instantly.</p>
            </div>
          </div>
          <div class="starter-prompts">
            <p class="starter-prompt-label">Try asking</p>
            <div class="starter-prompt-chips">
              <button class="prompt-chip" type="button" data-prompt="I received a suspicious KYC message from my bank asking to click a link. Is it safe?">🏦 Suspicious bank SMS</button>
              <button class="prompt-chip" type="button" data-prompt="Someone called me claiming to be from TRAI and said my number will be blocked. What should I do?">📞 TRAI impersonation call</button>
              <button class="prompt-chip" type="button" data-prompt="I downloaded an APK file from a WhatsApp group. Can you check if it's safe?">📦 Check APK safety</button>
              <button class="prompt-chip" type="button" data-prompt="I accidentally clicked a link and entered my OTP. Have I been scammed?">⚠️ Clicked suspicious link</button>
            </div>
          </div>
        `;
        // Wire up prompt chip clicks
        starter.querySelectorAll('.prompt-chip').forEach((btn) => {
          btn.addEventListener('click', () => {
            const prompt = btn.dataset.prompt;
            if (prompt) {
              const ta = document.getElementById('composerInput');
              if (ta) { ta.value = prompt; ta.focus(); }
            }
          });

        thread.appendChild(starter);
        state.followThread = true;
        updateJumpToLatestButton();

      }

      for (const msg of chat.messages) {
        const row = document.createElement('div');
        row.className = 'msg ' + (msg.role === 'user' ? 'user' : 'bot');
        row.dataset.messageId = String(msg.id || '');

        const bubble = document.createElement('div');
        bubble.className = 'bubble ' + (msg.role === 'user' ? 'user' : 'bot');

        const head = document.createElement('div');
        head.className = 'bubble-head';
        const label = msg.role === 'user' ? state.profile.name : 'SATARK AI';
        head.innerHTML = `<span>${escapeHtml(label)}</span><span>${escapeHtml(formatTime(msg.ts))}</span>`;

        const body = document.createElement('div');
        body.className = 'bubble-body';
        const text = msg.role === 'assistant'
          ? String(msg.text || '').trim()

        const hasClarification = (
          msg.role === 'assistant'

          const question = document.createElement('p');
          question.className = 'clarification-question';

          why.className = 'clarification-why';
          why.textContent = String(msg.clarification.why_needed || 'This changes urgency and next steps.');

        if (msg.role === 'assistant' && Array.isArray(msg.steps) && msg.steps.length) {

        if (msg.role === 'assistant' && isAnalystMode() && (msg.analysisStage || msg.caseId || msg.runId)) {

          const stage = normalizeStage(msg.analysisStage);

          }

          if (msg.contractVersion) {

            contractNode.textContent = `Contract ${String(msg.contractVersion)}`;
            strip.appendChild(contractNode);
          }

          body.appendChild(strip);
        }

        const canTriggerDeep = (
          msg.role === 'assistant'
          && normalizeStage(msg.analysisStage) === 'triage'
          && Boolean(msg.eligibleForDeep)
          && !msg.clarification
          && String(msg.runId || '').trim()

        if (canTriggerDeep) {
          const actionWrap = document.createElement('div');
          actionWrap.className = 'deep-action-wrap';
          const button = document.createElement('button');
          button.type = 'button';

          const stateLabel = String(msg.deepRunState || '').trim().toLowerCase();

          } else if (stateLabel === 'done') {

          } else {

            button.disabled = state.isProcessing;
            button.addEventListener('click', () => {

          }

          actionWrap.appendChild(button);

          if (msg.deepReason) {
            const note = document.createElement('span');
            note.className = 'msg-meta-note';
            note.textContent = String(msg.deepReason);
            actionWrap.appendChild(note);
          }
          body.appendChild(actionWrap);
        }

        if (Array.isArray(msg.attachments) && msg.attachments.length) {
          const wrap = document.createElement('div');
          wrap.className = 'msg-attachments';
          for (const attachment of msg.attachments) {
            const card = document.createElement('div');
            card.className = 'msg-attachment-card';

            const badge = document.createElement('span');

            badge.textContent = String(attachment.category || 'file');
            const footer = document.createElement('div');

            footer.appendChild(badge);

        bubble.appendChild(head);
        bubble.appendChild(body);

      requestAnimationFrame(() => {

    function escapeHtml(text) {
      return String(text || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function renderTextWithLinks(text) {
      const src = String(text || '');
      if (!src) return '';
      const urlRegex = /(https?:\/\/[^\s<>")']+)/gi;
      let out = '';
      let lastIndex = 0;
      let match = urlRegex.exec(src);
      while (match) {
        const url = String(match[0] || '').trim();
        out += escapeHtml(src.slice(lastIndex, match.index)).replace(/\n/g, '<br>');
        const safeUrl = escapeHtml(url);
        out += `<a href="${safeUrl}" target="_blank" rel="noopener noreferrer">${safeUrl}</a>`;
        lastIndex = match.index + url.length;
        match = urlRegex.exec(src);
      }
      out += escapeHtml(src.slice(lastIndex)).replace(/\n/g, '<br>');
      return out;
    }

    function isYesOption(optionId) {
      const v = String(optionId || '').trim().toLowerCase();
      return v === 'yes' || v === 'y' || v === 'true';
    }

    function queueFirConsentPrompt(context = {}, delayMs = 4200) {
      const caseKey = String(context.caseId || context.runId || 'global').trim() || 'global';
      if (state.firConsentByCase[caseKey]) return;
      state.firConsentByCase[caseKey] = true;

      queueAssistantFollowup(
        'If you are ready, I can generate an FIR Google Docs report and an email draft now. Shall I continue?',
        delayMs,
        {
          flags: [{ text: 'FIR and email prep', level: 'warn' }],
          clarification: {
            question_id: 'generate_fir_docs',
            question_text: 'Generate FIR Google Docs report and Gmail draft now?',
            why_needed: 'I need your confirmation before creating these artifacts.',
            options: [
              { id: 'yes', label: 'Yes' },
              { id: 'no', label: 'No' },
            ],
          },
          clarificationContext: {
            text: String(context.text || '').trim(),
            files: Array.isArray(context.files) ? context.files : [],
            preprocessed_context: context.preprocessed_context && typeof context.preprocessed_context === 'object'
              ? context.preprocessed_context
              : {},
            recovery_answers: context.recovery_answers && typeof context.recovery_answers === 'object'
              ? context.recovery_answers
              : {},
          },
          caseId: context.caseId || null,
          runId: context.runId || null,

          sourceRunId: context.sourceRunId || null,
          contractVersion: context.contractVersion || null,

        label: label || stateName,
      };
      renderAgentStrip();

    function addMessage(role, text, extra = {}) {
      const chat = getActiveChat();
      if (!chat) return;
      const message = {
        id: extra.id || nextMessageId(),
        role,
        text: role === 'assistant' ? String(text || '').trim() : sanitizeCitizenText(text),
        ts: new Date().toISOString(),
        steps: extra.steps || null,
        flags: extra.flags || null,
        confidenceNote: extra.confidenceNote || null,
        evidenceNarrative: extra.evidenceNarrative || null,
        uncertaintyNote: extra.uncertaintyNote || null,
        technicalDetails: Array.isArray(extra.technicalDetails) ? extra.technicalDetails : null,
        attachments: Array.isArray(extra.attachments) ? extra.attachments : [],
        runId: extra.runId || null,
        caseId: extra.caseId || null,
        analysisStage: extra.analysisStage || null,
        sourceRunId: extra.sourceRunId || null,
        contractVersion: extra.contractVersion || null,
        analysisStageVersion: extra.analysisStageVersion || null,
        eligibleForDeep: Boolean(extra.eligibleForDeep),
        deepReason: extra.deepReason || null,
        deepReasonCode: extra.deepReasonCode || null,
        deepAnalysisUrl: extra.deepAnalysisUrl || null,
        deepRunId: extra.deepRunId || null,
        deepRunState: extra.deepRunState || null,
        idempotentReplay: Boolean(extra.idempotentReplay),
        clarification: extra.clarification && typeof extra.clarification === 'object' ? extra.clarification : null,
        clarificationContext: extra.clarificationContext && typeof extra.clarificationContext === 'object' ? extra.clarificationContext : null,
        clarificationPending: Boolean(extra.clarificationPending),
        clarificationAnswered: Boolean(extra.clarificationAnswered),
        clarificationSelectedId: extra.clarificationSelectedId || null,
        clarificationSelectedLabel: extra.clarificationSelectedLabel || null,
        clarificationPendingPhase: Number(extra.clarificationPendingPhase || 0),
        clarificationPendingStartedAt: extra.clarificationPendingStartedAt || null,
        integrationStatus: extra.integrationStatus && typeof extra.integrationStatus === 'object' ? extra.integrationStatus : null,
      };
      chat.messages.push(message);
      if (chat.messages.length === 1 && role === 'user') {
        chat.title = makeTitleFromText(text);
      }
      updateChat(chat);
      render();
      return message.id;
    }

    function queueAssistantFollowup(text, delayMs, extra = {}) {
      const body = String(text || '').trim();
      if (!body) return;
      const waitMs = Math.max(5000, Math.min(90000, Number(delayMs || 30000) || 30000));
      window.setTimeout(() => {
        addMessage('assistant', body, extra);
      }, waitMs);
    }

    async function fileToDataUrl(file) {
      return await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ''));
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function closeStreamAndPoll() {
      if (state.evtSource) {
        try { state.evtSource.close(); } catch (_e) {}
        state.evtSource = null;
      }
      if (state.pollTimer) {
        clearInterval(state.pollTimer);
        state.pollTimer = null;
      }
    }

    function buildAssistantPayload(result) {
      function normalizeSteps(items) {
        const arr = Array.isArray(items) ? items : [];
        const out = [];
        const seen = new Set();
        for (const item of arr) {
          let step = sanitizeCitizenText(String(item || '').replace(/^[-*\d.\s]+/, '').trim());
          if (!step) continue;
          const key = step.toLowerCase();
          if (seen.has(key)) continue;
          seen.add(key);
          out.push(step);
          if (out.length >= 4) break;
        }
        return out;
      }

      const mainReply = String(result.chat_reply || result.conversational_reply || result.summary || '').trim();
      const narrativeFollowupMessage = String(result.narrative_followup_message || '').trim();
      const narrativeFollowupDelayMs = Math.max(5000, Math.min(90000, Number(result.narrative_followup_delay_ms || 30000) || 30000));
      const reportingArtifactsPendingNarrative = Boolean(result.reporting_artifacts_pending_narrative);
      const caseReportDoc = result.case_report_doc && typeof result.case_report_doc === 'object' ? result.case_report_doc : {};
      const gmailDraft = result.gmail_draft && typeof result.gmail_draft === 'object' ? result.gmail_draft : {};
      const followUpActions = result.follow_up_actions && typeof result.follow_up_actions === 'object' ? result.follow_up_actions : {};
      const docCreated = Boolean(caseReportDoc.created);
      const docUrl = String(caseReportDoc.doc_url || '').trim();
      const gmailDraftCreated = Boolean(gmailDraft.created);
      const gmailDraftUrl = String(gmailDraft.draft_url || '').trim();
      const integrationStatus = {
        visible: Boolean(
          result.requires_emergency
          || result.golden_hour_active
          || followUpActions.calendar_event_created
          || followUpActions.task_created
          || followUpActions.calendar_attempted
          || String(followUpActions.task_url || '').trim()
        ),
        calendarCreated: Boolean(followUpActions.calendar_event_created),
        calendarAttempted: Boolean(followUpActions.calendar_attempted),
        calendarError: String(followUpActions.calendar_error || '').trim(),
        calendarUrl: String(followUpActions.calendar_url || result.calendar_deep_link || '').trim(),
        taskCreated: Boolean(followUpActions.task_created),
        taskAttempted: Boolean(followUpActions.task_created) || Boolean(String(followUpActions.task_url || '').trim()),
        taskError: '',
        taskUrl: String(followUpActions.task_url || result.task_deep_link || '').trim(),
        docCreated: Boolean(followUpActions.doc_created || docCreated),
        docError: String(caseReportDoc.error || '').trim(),
        docUrl: String(followUpActions.doc_url || docUrl || '').trim(),
        gmailDraftCreated: Boolean(followUpActions.gmail_draft_created || gmailDraftCreated),
        gmailError: String(gmailDraft.error || '').trim(),
        gmailDraftUrl: String(followUpActions.gmail_draft_url || gmailDraftUrl || '').trim(),
      };
      const steps = normalizeSteps(result.recommended_actions);
      const analysisStage = normalizeStage(result.analysis_stage);
      const caseId = String(result.case_id || '').trim() || null;
      const sourceRunId = String(result.source_run_id || '').trim() || null;
      const contractVersion = String(result.contract_version || '').trim() || null;
      const analysisStageVersion = Number(result.analysis_stage_version || 0) || null;
      const deepReason = String(result.deep_reason || '').trim() || null;
      const deepReasonCode = String(result.deep_reason_code || '').trim() || null;
