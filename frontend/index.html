      const eligibleForDeep = Boolean(result.eligible_for_deep);
      const goldenHourActive = Boolean(result.golden_hour_active || String(result.golden_hour_status || '').toUpperCase() === 'ACTIVE');

      const clarification = result && result.needs_clarification && result.clarification && typeof result.clarification === 'object'
        ? {
            question_id: String(result.clarification.question_id || 'clarification_needed').trim() || 'clarification_needed',
            question_text: String(result.clarification.question_text || '').trim() || 'I need one quick clarification before finalizing next steps.',
            why_needed: String(result.clarification.why_needed || '').trim() || 'This changes urgency and exact next steps.',
            options: Array.isArray(result.clarification.options)
              ? result.clarification.options
                  .map((item) => ({
                    id: String((item && item.id) || '').trim().toLowerCase(),
                    label: String((item && item.label) || (item && item.id) || '').trim(),
                  }))
                  .filter((item) => item.id && item.label)
                  .slice(0, 6)
              : [],
          }
        : null;

      if (clarification && !clarification.options.length) {
        clarification.options = [
          { id: 'yes', label: 'Yes' },
          { id: 'no', label: 'No' },
          { id: 'not_sure', label: 'Not sure' },
        ];
      }

      const why = Array.isArray(result.why_this_decision) ? result.why_this_decision.map((x) => sanitizeCitizenText(String(x || '').trim())).filter(Boolean) : [];
      const evidenceNarrative = why.length ? `Why this verdict: ${why.slice(0, 2).join(' ')}` : '';

      let confidenceNote = '';
      const confidenceRaw = Number(result.confidence || 0);
      if (!Number.isNaN(confidenceRaw) && confidenceRaw > 0) {
        const confidencePct = confidenceRaw <= 1 ? Math.round(confidenceRaw * 100) : Math.round(confidenceRaw);
        confidenceNote = `Confidence: ${confidencePct}%`;
      }

      const uncertaintyNote = sanitizeCitizenText(String(result.uncertainty_note || '').trim());

      const technicalDetails = [];
      if (result.apk_analysis && typeof result.apk_analysis === 'object') {

        if (apk.app_name) technicalDetails.push(`App: ${apk.app_name}`);
        if (apk.package_name) technicalDetails.push(`Package: ${apk.package_name}`);
        if (apk.identity) technicalDetails.push(`Identity assessment: ${apk.identity}`);
      }

      if (result.timings_ms && typeof result.timings_ms === 'object') {
        const classifyMs = Number(result.timings_ms.classify_ms || 0);
        const vectorMs = Number(result.timings_ms.vector_lookup_ms || 0);
        const pipelineMs = Number(result.timings_ms.pipeline_ms || 0);
        const totalMs = Number(result.timings_ms.total_ms || 0);
        if (totalMs > 0) {
          technicalDetails.push(`Latency: total ${Math.round(totalMs)} ms | classify ${Math.round(classifyMs)} ms | retrieval ${Math.round(vectorMs)} ms | pipeline ${Math.round(pipelineMs)} ms`);
        }
      }

      if (clarification) {
        return {
          ok: true,
          text: mainReply || 'One quick check before I finalize the safest next steps.',
          steps: [],
          flags: [{ text: 'Need your input', level: 'warn' }],
          confidenceNote,
          evidenceNarrative,
          uncertaintyNote,
          technicalDetails,
          followupMessage: '',
          followupDelayMs: narrativeFollowupDelayMs,
          reportingArtifactsPendingNarrative,
          clarification,
          analysisStage,
          caseId,
          sourceRunId,
          contractVersion,
          analysisStageVersion,
          deepReason,
          deepReasonCode,
          deepAnalysisUrl,
          eligibleForDeep,
          goldenHourActive,
          integrationStatus,
          docCreated,
          docUrl,
          gmailDraftCreated,
          gmailDraftUrl,
        };
      }

      if (!mainReply || steps.length < 2) {
        return {
          ok: false,
          error: 'Model response is incomplete. Please retry this analysis.',
          text: '',
          steps: [],
          flags: [],
          confidenceNote: '',
          evidenceNarrative: '',
          uncertaintyNote: '',
          technicalDetails: [],
          followupMessage: '',
          followupDelayMs: narrativeFollowupDelayMs,
          reportingArtifactsPendingNarrative,
          analysisStage,
          caseId,
          sourceRunId,
          contractVersion,
          analysisStageVersion,
          deepReason,
          deepReasonCode,
          deepAnalysisUrl,

      return {

    }

    function startStream(runId) {
      closeStreamAndPoll();
      state.agentStatus = {};
      renderAgentStrip();

      const src = new EventSource('/api/stream/' + encodeURIComponent(runId));
      state.evtSource = src;

      src.addEventListener('run.classified', (evt) => {
        try {
          const data = JSON.parse(evt.data || '{}');
          const selected = Array.isArray(data.selected_agents) ? data.selected_agents : [];
          setAgentState('manager', 'running', AGENT_PROGRESS_HINTS.manager || 'starting');
          for (const name of selected) {
            const key = String(name || '');
            setAgentState(key, 'running', AGENT_PROGRESS_HINTS[key] || 'queued');
          }
        } catch (_e) {}
      });

      src.addEventListener('run.fast_path_selected', () => {
        setAgentState('manager', 'running', 'fast path selected');
      });

      src.addEventListener('run.clarification_requested', () => {
        setAgentState('manager', 'running', 'awaiting your quick answer');
      });

      src.addEventListener('run.preliminary_ready', () => {
        setAgentState('apk_analyzer', 'running', 'preliminary ready');
      });

      src.addEventListener('run.enrichment_started', () => {
        setAgentState('osint', 'running', 'enrichment running');
      });

      src.addEventListener('run.refined_ready', () => {
        setAgentState('manager', 'running', 'refined verdict ready');
      });

      src.addEventListener('triage.completed', () => {
        setAgentState('manager', 'done', 'triage completed');
      });

      src.addEventListener('deep.completed', () => {
        setAgentState('manager', 'done', 'deep completed');
      });

      src.addEventListener('agent.started', (evt) => {
        try {
          const data = JSON.parse(evt.data || '{}');
          const agent = String(data.agent || '').trim();
          if (agent) setAgentState(agent, 'running', AGENT_PROGRESS_HINTS[agent] || 'running');
        } catch (_e) {}
      });

      src.addEventListener('agent.progress', (evt) => {
        try {
          const data = JSON.parse(evt.data || '{}');
          const agent = String(data.agent || '').trim();
          const message = String(data.message || '').trim();
          if (!agent) return;
          setAgentState(agent, 'running', message || AGENT_PROGRESS_HINTS[agent] || 'running');
        } catch (_e) {}
      });

      src.addEventListener('agent.completed', (evt) => {
        try {
          const data = JSON.parse(evt.data || '{}');
          const agent = String(data.agent || '').trim();
          if (!agent) return;
          const status = String(data.status || 'done').toLowerCase();
          if (status === 'failed') setAgentState(agent, 'failed', 'failed');
          else if (status === 'skipped') setAgentState(agent, 'done', 'skipped');
          else setAgentState(agent, 'done', 'done');
        } catch (_e) {}
      });

      src.addEventListener('run.failed', () => {
        state.isProcessing = false;
        render();
        closeStreamAndPoll();
      });

      src.onerror = () => {
        try { src.close(); } catch (_e) {}
      };
    }

    async function waitForResult(runId) {
      return await new Promise((resolve, reject) => {
        let attempts = 0;
        const maxAttempts = 90;
        let inFlight = false;
        state.pollTimer = setInterval(async () => {
          if (inFlight) return;
          attempts += 1;
          if (attempts > maxAttempts) {
            clearInterval(state.pollTimer);
            state.pollTimer = null;
            reject(new Error('Analysis timed out'));
            return;
          }

          try {
            inFlight = true;
            const res = await fetch('/api/result/' + encodeURIComponent(runId));
            if (res.status === 202) return;
            if (!res.ok) throw new Error('Could not fetch result');
            const data = await res.json();
            clearInterval(state.pollTimer);
            state.pollTimer = null;
            resolve(data);
          } catch (err) {
            clearInterval(state.pollTimer);
            state.pollTimer = null;
            reject(err);
          } finally {
            inFlight = false;
          }
        }, 800);
      });
    }

    function parseChoiceToTriState(optionId) {
      const o = String(optionId || '').trim().toLowerCase();
      if (['yes', 'y', 'true', 'clicked', 'lost', 'shared'].includes(o)) return true;
      if (['no', 'n', 'false', 'not_clicked', 'did_not_click', 'safe'].includes(o)) return false;
      if (['not_sure', 'unknown', 'maybe', 'unsure'].includes(o)) return null;
      return null;
    }

    function buildRecoveryAnswers(questionId, optionId, existingAnswers = {}) {
      const q = String(questionId || '').trim().toLowerCase();
      const o = String(optionId || '').trim().toLowerCase();
      const tri = parseChoiceToTriState(o);
      const merged = (existingAnswers && typeof existingAnswers === 'object')
        ? JSON.parse(JSON.stringify(existingAnswers))
        : {};

      const assignTriState = (key) => {
        merged[key] = tri;
      };

      if (q === 'clicked_link' || q === 'opened_link') {
        assignTriState('clicked_link');
        return merged;
      }

      if (q === 'installed_apk' || q === 'downloaded_apk' || q === 'opened_apk' || q === 'installed_or_opened_apk') {
        assignTriState('installed_apk');
        assignTriState('downloaded_apk');
        return merged;
      }

      if (
        q === 'shared_sensitive'
        || q === 'shared_sensitive_data'
        || q === 'shared_sensitive_details'
        || q === 'shared_personal_details'
        || q === 'shared_otp'
        || q === 'shared_otp_or_pin'
      ) {
        assignTriState('shared_sensitive_data');
        assignTriState('shared_personal_details');
        return merged;
      }

      if (q === 'shared_bank_details' || q === 'shared_bank_or_otp') {
        assignTriState('shared_bank_details');
        return merged;
      }

      if (q === 'money_lost' || q === 'did_lose_money' || q === 'did_lose_money_or_share_bank_details') {
        assignTriState('did_lose_money_or_share_bank_details');
        assignTriState('did_lose_money');
        return merged;
      }

      if (q === 'amount_lost_bucket' || q === 'amount_bucket' || q === 'money_loss_range') {
        const amountMap = {
          under_10k: 5000,
          between_10k_50k: 25000,
          between_50k_100k: 75000,
          over_100k: 150000,
        };
        if (o === 'not_sure' || o === 'unknown') {
          merged.amount_lost_bucket = 'not_sure';
        } else if (Object.prototype.hasOwnProperty.call(amountMap, o)) {
          merged.amount_lost_bucket = o;
          merged.amount_lost = amountMap[o];
          merged.did_lose_money = true;
          merged.did_lose_money_or_share_bank_details = true;
        }
        return merged;
      }

      if (q === 'time_bucket') {
        if (o === 'within_15_min') {
          merged.time_bucket = 'within_15_min';
          merged.minutes_since_incident = 10;
          merged.minutes_since_fraud = 10;
        } else if (o === '15_30_min') {
          merged.time_bucket = '15_30_min';
          merged.minutes_since_incident = 25;
          merged.minutes_since_fraud = 25;
        } else if (o === '30_60_min') {
          merged.time_bucket = '30_60_min';
          merged.minutes_since_incident = 45;
          merged.minutes_since_fraud = 45;
        } else if (o === 'within_15_minutes') {
          merged.time_bucket = 'within_15_min';
          merged.minutes_since_incident = 10;
          merged.minutes_since_fraud = 10;
        } else if (o === 'within_30_min' || o === 'within_30_minutes') {
          merged.time_bucket = '15_30_min';
          merged.minutes_since_incident = 25;
          merged.minutes_since_fraud = 25;
        } else if (o === 'within_60_min' || o === 'within_60_minutes') {
          merged.time_bucket = '30_60_min';
          merged.minutes_since_incident = 45;
          merged.minutes_since_fraud = 45;
        } else if (o === 'over_1_hour') {
          merged.time_bucket = 'over_1_hour';
          merged.minutes_since_incident = 90;
          merged.minutes_since_fraud = 90;
        } else if (o === 'over_1_day') {
          merged.time_bucket = 'over_1_day';
          merged.minutes_since_incident = 1440;
          merged.minutes_since_fraud = 1440;
        } else if (o === 'minutes' || o === 'min' || o === 'lt_60_min' || o === 'within_1_hour') {
          merged.time_bucket = 'minutes';
          merged.minutes_since_incident = 15;
          merged.minutes_since_fraud = 15;
        } else if (o === 'hours' || o === 'hr') {
          merged.time_bucket = 'hours';
          merged.minutes_since_incident = 180;
          merged.minutes_since_fraud = 180;
        } else if (o === 'days' || o === 'day') {
          merged.time_bucket = 'days';
          merged.minutes_since_incident = 1440;
          merged.minutes_since_fraud = 1440;
        } else if (o === 'not_sure' || o === 'unknown') {
          merged.time_bucket = null;
          merged.minutes_since_incident = null;
          merged.minutes_since_fraud = null;
        }
        return merged;
      }

      if (q === 'minutes_since_incident' || q === 'minutes_since_fraud') {
        const raw = Number(o);
        if (!Number.isNaN(raw) && raw >= 0) {
          merged.minutes_since_incident = raw;
          merged.minutes_since_fraud = raw;
          if (raw <= 15) merged.time_bucket = 'within_15_min';
          else if (raw <= 30) merged.time_bucket = '15_30_min';
          else if (raw <= 60) merged.time_bucket = '30_60_min';
          else if (raw <= 1440) merged.time_bucket = 'over_1_hour';
          else merged.time_bucket = 'over_1_day';
        }
        return merged;
      }

      // Preserve dynamic clarification identifiers for backend/model awareness.
      merged[q] = tri === null ? o : tri;
      return merged;
    }

    function shouldTriggerMcpActions(recoveryAnswers = {}) {
      const answers = (recoveryAnswers && typeof recoveryAnswers === 'object') ? recoveryAnswers : {};
      const lost = answers.did_lose_money_or_share_bank_details === true || answers.did_lose_money === true;
      if (!lost) return false;

      const minutes = Number(answers.minutes_since_incident || answers.minutes_since_fraud || 0);
      if (!Number.isNaN(minutes) && minutes > 0) return minutes <= 60;

      const bucket = String(
        answers.time_bucket
        || answers.time_since_loss
        || answers.minutes_bucket
        || answers.minutes_since_fraud_bucket
        || ''
      ).trim().toLowerCase();
      return [
        'within_15_min',
        'within_15_minutes',
        '15_30_min',
        'within_30_min',
        'within_30_minutes',
        '30_60_min',
        'within_60_min',
        'within_60_minutes',
        'minutes',
        'lt_60_min',
        'within_1_hour',
      ].includes(bucket);
    }

    async function handleClarificationChoice(messageId, choice) {
      if (!messageId || state.isProcessing) return;

      const chat = getActiveChat();
      if (!chat) return;
      const target = (chat.messages || []).find((m) => m && m.id === messageId);
      if (!target || !target.clarification) return;

      const questionId = String(target.clarification.question_id || 'clarification_needed').trim();
      const choiceId = String(choice && choice.id ? choice.id : '').trim().toLowerCase();
      const choiceLabel = String(choice && choice.label ? choice.label : choiceId).trim() || 'Selected option';
      if (!choiceId) return;

      const baseText = String((target.clarificationContext && target.clarificationContext.text) || '').trim();
      const followupFiles = (target.clarificationContext && Array.isArray(target.clarificationContext.files))
        ? JSON.parse(JSON.stringify(target.clarificationContext.files))
        : [];
      if (!baseText && !followupFiles.length) return;

      const followupPreprocessed = (
        target.clarificationContext
        && target.clarificationContext.preprocessed_context
        && typeof target.clarificationContext.preprocessed_context === 'object'
      )
        ? JSON.parse(JSON.stringify(target.clarificationContext.preprocessed_context))
        : {};
      const previousRecoveryAnswers = (
        target.clarificationContext
        && target.clarificationContext.recovery_answers
        && typeof target.clarificationContext.recovery_answers === 'object'
      )
        ? JSON.parse(JSON.stringify(target.clarificationContext.recovery_answers))
        : {};
      const mergedRecoveryAnswers = buildRecoveryAnswers(questionId, choiceId, previousRecoveryAnswers);
      const isFirGenerationQuestion = String(questionId || '').trim().toLowerCase() === 'generate_fir_docs';

      if (isFirGenerationQuestion && !isYesOption(choiceId)) {
        updateMessageById(messageId, {
          clarificationPending: false,
          clarificationAnswered: true,
          clarificationSelectedId: choiceId,
          clarificationSelectedLabel: choiceLabel,
          clarificationPendingStartedAt: null,
          clarificationPendingPhase: 0,
          text: 'No problem. I will skip FIR and email generation for now. If you want it later, just tell me "generate FIR now".',
          steps: [],
          flags: [{ text: 'Skipped by you', level: 'warn' }],
          clarification: null,
        });
        return;
      }

      state.isProcessing = true;
      document.getElementById('composerHint').textContent = 'Refining answer based on your input...';

      updateMessageById(messageId, {
        clarificationPending: true,
        clarificationAnswered: true,
        clarificationSelectedId: choiceId,
        clarificationSelectedLabel: choiceLabel,
        clarificationPendingStartedAt: Date.now(),
        clarificationPendingPhase: 0,
        steps: [],
        flags: [{ text: 'Refining answer', level: 'warn' }],
      });
      startClarificationPulse(messageId);

      const payload = {
        session_id: getSessionId(),
        user_input: {
          text: baseText,
          files: followupFiles,
        },
        user_context: {
          channel: 'web-ui',
          locale: navigator.language || 'en-IN',
        },
        options: {
          stream: true,
          generate_report: isFirGenerationQuestion,
          deep_analysis: false,
          fast_first: true,
          clarification_followup: true,
          trigger_mcp_actions: isFirGenerationQuestion ? true : shouldTriggerMcpActions(mergedRecoveryAnswers),
          response_instruction: GEMINI_REPLY_INSTRUCTION,
          enforce_response_structure: true,
          output_format: 'summary_and_bullets',
          recovery_answers: mergedRecoveryAnswers,
          preprocessed_context: followupPreprocessed,
        },
      };

      try {
        const analyzeRes = await fetch('/api/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        if (!analyzeRes.ok) throw new Error('Could not start follow-up analysis');

        const ack = await analyzeRes.json();
        const runId = String(ack.run_id || '').trim();
        if (!runId) throw new Error('Missing run id for follow-up');
        state.currentRunId = runId;
        startStream(runId);

        const result = await waitForResult(runId);
        state.latestPayload = result;
        const assistant = buildAssistantPayload(result || {});

        if (!assistant.ok) {
          updateMessageById(messageId, {
            text: assistant.error || 'Model response is incomplete. Please retry this analysis.',
            steps: [],
            flags: [],
            clarification: null,
            clarificationPending: false,
            clarificationAnswered: false,
            runId,
            caseId: assistant.caseId,
            analysisStage: assistant.analysisStage,
            sourceRunId: assistant.sourceRunId,
            contractVersion: assistant.contractVersion,
            analysisStageVersion: assistant.analysisStageVersion,
            eligibleForDeep: assistant.eligibleForDeep,
            deepReason: assistant.deepReason,
            deepReasonCode: assistant.deepReasonCode,
            deepAnalysisUrl: assistant.deepAnalysisUrl,
            integrationStatus: assistant.integrationStatus,
          });
        } else {
          updateMessageById(messageId, {
            text: assistant.text,
            steps: assistant.steps,
            flags: assistant.flags,
            confidenceNote: assistant.confidenceNote,
            evidenceNarrative: assistant.evidenceNarrative,
            uncertaintyNote: assistant.uncertaintyNote,
            technicalDetails: assistant.technicalDetails,
            clarification: assistant.clarification,
            clarificationContext: assistant.clarification
              ? {
                  text: baseText,
                  files: followupFiles,
                  preprocessed_context: followupPreprocessed,
                  recovery_answers: mergedRecoveryAnswers,
                }
              : null,
            clarificationPending: false,
            clarificationAnswered: !assistant.clarification,
            clarificationSelectedId: assistant.clarification ? null : choiceId,
            clarificationSelectedLabel: assistant.clarification ? null : choiceLabel,
            clarificationPendingStartedAt: null,
            clarificationPendingPhase: 0,
            runId,
            caseId: assistant.caseId,
            analysisStage: assistant.analysisStage,
            sourceRunId: assistant.sourceRunId,
            contractVersion: assistant.contractVersion,
            analysisStageVersion: assistant.analysisStageVersion,
            eligibleForDeep: assistant.eligibleForDeep,
            deepReason: assistant.deepReason,
            deepReasonCode: assistant.deepReasonCode,
            deepAnalysisUrl: assistant.deepAnalysisUrl,
            integrationStatus: assistant.integrationStatus,
          });

          if (!assistant.clarification && assistant.followupMessage) {
            queueAssistantFollowup(assistant.followupMessage, assistant.followupDelayMs, {
              flags: [{ text: 'Report details needed', level: 'warn' }],
              caseId: assistant.caseId,
              runId,
              analysisStage: assistant.analysisStage,
              sourceRunId: assistant.sourceRunId,
              contractVersion: assistant.contractVersion,
              analysisStageVersion: assistant.analysisStageVersion,
              eligibleForDeep: assistant.eligibleForDeep,
              deepReason: assistant.deepReason,
              deepReasonCode: assistant.deepReasonCode,
              deepAnalysisUrl: assistant.deepAnalysisUrl,
            });
          }

          if (!assistant.clarification && assistant.goldenHourActive) {
            queueAssistantFollowup(
              'Good that you are still inside the Golden Hour. If a financial fraud is reported within 60 minutes, recovery chances are very high. I am creating Google Calendar events and Google Tasks now so you can act fast.',
              1200,
              {
                flags: [{ text: 'Golden Hour active', level: 'warn' }],
                caseId: assistant.caseId,
                runId,
              }
            );

            queueFirConsentPrompt({
              text: baseText,
              files: followupFiles,
              preprocessed_context: followupPreprocessed,
              recovery_answers: mergedRecoveryAnswers,
              caseId: assistant.caseId,
              runId,
              analysisStage: assistant.analysisStage,
              sourceRunId: assistant.sourceRunId,
              contractVersion: assistant.contractVersion,
              analysisStageVersion: assistant.analysisStageVersion,
              eligibleForDeep: assistant.eligibleForDeep,
              deepReason: assistant.deepReason,
              deepReasonCode: assistant.deepReasonCode,
              deepAnalysisUrl: assistant.deepAnalysisUrl,
            }, 4200);
          }

          if (!assistant.clarification && assistant.docCreated && assistant.docUrl) {
            queueAssistantFollowup(
              `Done. Your FIR Google Doc is ready: ${assistant.docUrl}\n\nPlease check your Gmail app for the draft email as well.`,
              900,
              {
                flags: [{ text: 'Artifacts ready', level: 'warn' }],
                caseId: assistant.caseId,
                runId,
              }
            );
          }
        }
      } catch (_err) {
        updateMessageById(messageId, {
          clarificationPending: false,
          clarificationAnswered: false,
          clarificationPendingStartedAt: null,
          clarificationPendingPhase: 0,
          text: 'I could not refine this answer right now. Please try selecting again in a moment.',
          steps: [],
          flags: [{ text: 'Retry needed', level: 'warn' }],
        });
      } finally {
        const fileInput = document.getElementById('fileInput');
        if (fileInput) fileInput.value = '';
        stopClarificationPulse();
        state.isProcessing = false;
        document.getElementById('composerHint').textContent = 'Enter to send, Shift+Enter for new line';
        closeStreamAndPoll();
        render();
      }
    }

    async function sendMessage() {
      if (state.isProcessing) return;
      const input = document.getElementById('composerInput');
      const text = String(input.value || '').trim();
      if (!text && !state.selectedFiles.length) {
        input.focus();
        return;
      }

      if (!getActiveChat()) {
        const chat = createChat('New SATARK chat');
        state.chats.unshift(chat);
        state.activeChatId = chat.id;
      }

      const pendingFiles = state.selectedFiles.slice();
      const pendingAttachments = pendingFiles.map((f) => toAttachmentViewModel(f));
      const pendingText = text;

      const userMessageId = addMessage('user', text || '(Sent file evidence)', {
        attachments: pendingAttachments,
      });
      const thinkingMessageId = addMessage('assistant', 'SATARK AI is analyzing your case.', {
        flags: [{ text: 'Analyzing', level: 'warn' }],
        clarificationPendingPhase: 0,
      });
      startThinkingPulse(thinkingMessageId);
      state.followThread = true;
      input.value = '';
      state.selectedFiles = [];
      renderAttachment();
      state.isProcessing = true;
      document.getElementById('composerHint').textContent = 'SATARK is working...';
      renderAgentStrip();

      try {
        const files = [];
        for (const selected of pendingFiles) {
          if (!selected || !selected.file) continue;
          const dataUrl = selected.contentBase64 || await fileToDataUrl(selected.file);
          if (!dataUrl) continue;
          if (!selected.contentBase64) selected.contentBase64 = String(dataUrl);
          files.push({
            file_name: selected.name,
            file_type: selected.mimeType || 'application/octet-stream',
            content_base64: dataUrl,
          });
        }

        updateMessageById(userMessageId, {
          attachments: pendingFiles.map((f) => toAttachmentViewModel(f)),
        });

        const payload = {
          session_id: getSessionId(),
          user_input: {
            text: pendingText,
            files,
          },
          user_context: {
            channel: 'web-ui',
            locale: navigator.language || 'en-IN',
          },
          options: {
            stream: true,
            generate_report: false,
            deep_analysis: false,
            fast_first: true,
            trigger_mcp_actions: Boolean(state.profile.connected),
            response_instruction: GEMINI_REPLY_INSTRUCTION,
            enforce_response_structure: true,
            output_format: 'summary_and_bullets',
          },
        };

        const analyzeRes = await fetch('/api/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });

        if (!analyzeRes.ok) {
          throw new Error('Could not start analysis');
        }

        const ack = await analyzeRes.json();
        const runId = String(ack.run_id || '').trim();
        if (!runId) throw new Error('Missing run id');
        state.currentRunId = runId;
        startStream(runId);

        const result = await waitForResult(runId);
        state.latestPayload = result;

        const assistant = buildAssistantPayload(result || {});
        if (!assistant.ok) {
          updateMessageById(thinkingMessageId, {
            text: assistant.error || 'Model response is incomplete. Please retry this analysis.',
            steps: [],
            flags: [],
            runId,
            caseId: assistant.caseId,
            analysisStage: assistant.analysisStage,
            sourceRunId: assistant.sourceRunId,
            contractVersion: assistant.contractVersion,
            analysisStageVersion: assistant.analysisStageVersion,
            eligibleForDeep: assistant.eligibleForDeep,
            deepReason: assistant.deepReason,
            deepReasonCode: assistant.deepReasonCode,
            deepAnalysisUrl: assistant.deepAnalysisUrl,
            integrationStatus: assistant.integrationStatus,
          });
        } else {
          updateMessageById(thinkingMessageId, {
            text: assistant.text,
            steps: assistant.steps,
            flags: assistant.flags,
            confidenceNote: assistant.confidenceNote,
            evidenceNarrative: assistant.evidenceNarrative,
            uncertaintyNote: assistant.uncertaintyNote,
            technicalDetails: assistant.technicalDetails,
            clarification: assistant.clarification,
            clarificationContext: {
              text: pendingText,
              files: files,
              preprocessed_context: {},
              recovery_answers: {},
            },
            runId,
            caseId: assistant.caseId,
            analysisStage: assistant.analysisStage,
            sourceRunId: assistant.sourceRunId,
            contractVersion: assistant.contractVersion,
            analysisStageVersion: assistant.analysisStageVersion,
            eligibleForDeep: assistant.eligibleForDeep,
            deepReason: assistant.deepReason,
            deepReasonCode: assistant.deepReasonCode,
            deepAnalysisUrl: assistant.deepAnalysisUrl,
            integrationStatus: assistant.integrationStatus,
          });

          if (!assistant.clarification && assistant.followupMessage) {
            queueAssistantFollowup(assistant.followupMessage, assistant.followupDelayMs, {
              flags: [{ text: 'Report details needed', level: 'warn' }],
              caseId: assistant.caseId,
              runId,
              analysisStage: assistant.analysisStage,
              sourceRunId: assistant.sourceRunId,
              contractVersion: assistant.contractVersion,
              analysisStageVersion: assistant.analysisStageVersion,
              eligibleForDeep: assistant.eligibleForDeep,
              deepReason: assistant.deepReason,
              deepReasonCode: assistant.deepReasonCode,
              deepAnalysisUrl: assistant.deepAnalysisUrl,
            });
          }

          if (!assistant.clarification && assistant.goldenHourActive) {
            queueAssistantFollowup(
              'Good that you are still inside the Golden Hour. If a financial fraud is reported within 60 minutes, recovery chances are very high. I am creating Google Calendar events and Google Tasks now so you can act fast.',
              1200,
              {
                flags: [{ text: 'Golden Hour active', level: 'warn' }],
                caseId: assistant.caseId,
                runId,
              }
            );

            queueFirConsentPrompt({
              text: pendingText,
              files,
              preprocessed_context: {},
              recovery_answers: {},
              caseId: assistant.caseId,
              runId,
              analysisStage: assistant.analysisStage,
              sourceRunId: assistant.sourceRunId,
              contractVersion: assistant.contractVersion,
              analysisStageVersion: assistant.analysisStageVersion,
              eligibleForDeep: assistant.eligibleForDeep,
              deepReason: assistant.deepReason,
              deepReasonCode: assistant.deepReasonCode,
              deepAnalysisUrl: assistant.deepAnalysisUrl,
            }, 4200);
          }

          if (!assistant.clarification && assistant.docCreated && assistant.docUrl) {
            queueAssistantFollowup(
              `Done. Your FIR Google Doc is ready: ${assistant.docUrl}\n\nPlease check your Gmail app for the draft email as well.`,
              900,
              {
                flags: [{ text: 'Artifacts ready', level: 'warn' }],
                caseId: assistant.caseId,
                runId,
              }
            );
          }
        }

        const chat = getActiveChat();
        if (chat && chat.messages.length >= 2) {
          const firstUser = chat.messages.find((m) => m.role === 'user');
          if (firstUser) {
            chat.title = makeTitleFromText(firstUser.text);
            updateChat(chat);
          }
        }

      } catch (_err) {
        input.value = pendingText;
        state.selectedFiles = pendingFiles;
        // Keep a visible retry path without fabricating assistance.
        updateMessageById(thinkingMessageId, {
          text: 'I could not finish this request right now. Please try again in a moment.',
          steps: [],
          flags: [{ text: 'Retry needed', level: 'warn' }],
        });
      } finally {
        const fileInput = document.getElementById('fileInput');
        if (fileInput) fileInput.value = '';
        stopThinkingPulse();
        stopClarificationPulse();
        state.isProcessing = false;
        document.getElementById('composerHint').textContent = 'Enter to send, Shift+Enter for new line';
        closeStreamAndPoll();
        render();
      }
    }

    async function checkAuth() {
      try {
        const res = await fetch('/api/auth/status');
        const data = await res.json();
        state.profile.connected = !!data.connected;
        state.profile.email = data.email || null;
        state.profile.givenName = data.given_name || null;
        state.profile.familyName = data.family_name || null;
        state.profile.fullName = data.name || null;
        state.profile.name = resolveDisplayName(state.profile);
      } catch (_e) {
        state.profile.connected = false;
        state.profile.email = null;
        state.profile.givenName = null;
        state.profile.familyName = null;
        state.profile.fullName = null;
        state.profile.name = 'Guest';
      }
    }

    function setupMic() {
      const micBtn = document.getElementById('micBtn');
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

      if (SpeechRecognition) {
        const recog = new SpeechRecognition();
        recog.lang = navigator.language || 'en-IN';
        recog.interimResults = true;
        recog.maxAlternatives = 1;
        recog.continuous = true;
        state.speechRec = recog;

        recog.onstart = () => {
          const textarea = document.getElementById('composerInput');
          state.speechBaseText = String(textarea.value || '').trim();
          state.speechFinalText = '';
          state.recording = true;
          micBtn.classList.add('active');
          document.getElementById('composerHint').textContent = 'Listening... Speak now';
        };

        recog.onresult = (event) => {
          const textarea = document.getElementById('composerInput');
          let interim = '';
          for (let i = event.resultIndex; i < event.results.length; i += 1) {
            const transcript = String(event.results[i][0].transcript || '').trim();
            if (!transcript) continue;
            if (event.results[i].isFinal) {
              state.speechFinalText = (state.speechFinalText + ' ' + transcript).trim();
            } else {
              interim = (interim + ' ' + transcript).trim();
            }
          }
          textarea.value = [state.speechBaseText, state.speechFinalText, interim].filter(Boolean).join(' ').trim();
        };

        recog.onend = () => {
          const textarea = document.getElementById('composerInput');
          textarea.value = [state.speechBaseText, state.speechFinalText].filter(Boolean).join(' ').trim();
          state.speechBaseText = '';
          state.speechFinalText = '';
          state.recording = false;
          micBtn.classList.remove('active');
          document.getElementById('composerHint').textContent = 'Enter to send, Shift+Enter for new line';
        };

        micBtn.addEventListener('click', () => {
          if (state.recording) {
            recog.stop();
            return;
          }
          recog.start();
        });
        return;
      }

      // Backend-ready path for Google Cloud Speech streaming.
      const hasCaptureSupport = !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia && window.MediaRecorder);
      if (!hasCaptureSupport) {
        micBtn.disabled = true;
        micBtn.title = 'Live speech input is not supported in this browser.';
        document.getElementById('composerHint').textContent = 'Mic not supported in this browser. Please type your message.';
        return;
      }
      micBtn.addEventListener('click', async () => {
        if (state.recording && state.mediaRecorder) {
          state.mediaRecorder.stop();
          return;
        }
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          const recorder = new MediaRecorder(stream);
          state.mediaChunks = [];
          state.mediaRecorder = recorder;
          recorder.ondataavailable = (evt) => {
            if (evt.data && evt.data.size > 0) state.mediaChunks.push(evt.data);
          };
          recorder.onstart = () => {
            state.recording = true;
            micBtn.classList.add('active');
            document.getElementById('composerHint').textContent = 'Recording... click Mic to stop';
          };
          recorder.onstop = async () => {
            state.recording = false;
            micBtn.classList.remove('active');
            document.getElementById('composerHint').textContent = 'Audio captured as an attachment. Enter to send, Shift+Enter for new line';
            const blob = new Blob(state.mediaChunks, { type: 'audio/webm' });
            const audioFile = new File([blob], `voice-note-${Date.now()}.webm`, { type: 'audio/webm' });
            addSelectedFiles([audioFile]);
            stream.getTracks().forEach((t) => t.stop());
          };
          recorder.start();
        } catch (_e) {
          document.getElementById('composerHint').textContent = 'Mic access denied in this browser';
        }
      });
    }

    async function bootstrap() {
      state.analystMode = isAnalystMode();
      await checkAuth();
      loadChats();
      render();

      const input = document.getElementById('composerInput');
      const threadWrap = document.getElementById('threadWrap');
      const composerWrap = document.querySelector('.composer-wrap');
      input.addEventListener('keydown', (evt) => {
        if (evt.key === 'Enter' && !evt.shiftKey) {
          evt.preventDefault();
          sendMessage();
        }
      });

      if (composerWrap) {
        composerWrap.addEventListener('paste', handlePasteUploadEvent);
      }
      threadWrap.addEventListener('paste', handlePasteUploadEvent);
      window.addEventListener('paste', handlePasteUploadEvent);

      threadWrap.addEventListener('scroll', () => {
        state.followThread = isNearThreadBottom();
        updateJumpToLatestButton();
      });

      document.getElementById('jumpToLatestBtn').addEventListener('click', () => {
        state.followThread = true;
        scrollThreadToLatest(true);
      });

      document.getElementById('sendBtn').addEventListener('click', sendMessage);
      document.getElementById('newChatBtn').addEventListener('click', () => {
        const chat = createChat('New SATARK chat');
        state.chats.unshift(chat);
        state.activeChatId = chat.id;
        saveChats();
        closeSidebarOnMobile();
        render();
      });

      document.getElementById('chatSearch').addEventListener('input', (evt) => {
        state.search = String(evt.target.value || '');
        renderHistory();
      });

      document.getElementById('uploadBtn').addEventListener('click', () => {
        document.getElementById('fileInput').click();
      });

      document.getElementById('fileInput').addEventListener('change', (evt) => {
        const files = evt.target.files ? Array.from(evt.target.files) : [];
        addSelectedFiles(files);
        evt.target.value = '';
      });

      document.getElementById('signInBtn').addEventListener('click', () => {
        const sid = getSessionId();
        window.location.href = '/auth/google/start?session_id=' + encodeURIComponent(sid) + '&next=/ui';
      });

      document.getElementById('drawerToggle').addEventListener('click', () => {
        state.drawerOpen = !state.drawerOpen;
        document.getElementById('analystDrawer').classList.toggle('visible', state.drawerOpen);
      });

      document.getElementById('menuBtn').addEventListener('click', () => {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('visible');
      });

      document.getElementById('overlay').addEventListener('click', closeSidebarOnMobile);

      setupMic();

      const params = new URLSearchParams(window.location.search);
      if (params.get('google') === 'connected') {
        window.history.replaceState({}, '', '/ui');
      }
    }

    function closeSidebarOnMobile() {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('overlay').classList.remove('visible');
    }

    bootstrap();
  </script>
</body>
</html>
