<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SATARK AI Chat</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

    :root {
      --bg-deep: #061426;
      --bg-mid: #0b1f36;
      --panel: rgba(9, 21, 40, 0.9);
      --panel-soft: rgba(10, 25, 45, 0.72);
      --border: rgba(120, 180, 220, 0.22);
      --text: #e5f0ff;
      --text-muted: #9bb4d1;
      --brand: #20e3c2;
      --brand-deep: #1cb0a4;
      --user-bubble: #1c3a64;
      --bot-bubble: #0f2d4e;
      --chip-run: #4cc9f0;
      --chip-done: #3ddc97;
      --chip-failed: #ff6b6b;
      --warn: #ffb347;
      --danger: #ff5c5c;
      --radius: 18px;
      --shadow: 0 16px 40px rgba(0, 0, 0, 0.26);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: 'IBM Plex Sans', sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 800px at 10% -20%, rgba(39, 118, 202, 0.28), transparent),
        radial-gradient(900px 700px at 85% -10%, rgba(38, 170, 150, 0.20), transparent),
        linear-gradient(140deg, var(--bg-deep), var(--bg-mid));
    }

    .app {
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      min-height: 100vh;
      position: relative;
    }

    .sidebar {
      background: linear-gradient(180deg, rgba(10, 25, 48, 0.96), rgba(8, 18, 35, 0.93));
      border-right: 1px solid var(--border);
      padding: 18px 14px 14px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      backdrop-filter: blur(12px);
      z-index: 20;
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--panel-soft);
    }

    .brand h1 {
      margin: 0;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 20px;
      letter-spacing: 0.04em;
    }

    .brand small {
      color: var(--text-muted);
      font-size: 11px;
    }

    .new-chat {
      border: 0;
      border-radius: 12px;
      padding: 12px;
      font-weight: 700;
      color: #012330;
      background: linear-gradient(90deg, var(--brand), #7fffd4);
      cursor: pointer;
      transition: transform .15s ease;
    }

    .new-chat:hover {
      transform: translateY(-1px);
    }

    .search-wrap input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(7, 19, 36, 0.8);
      color: var(--text);
      padding: 10px 12px;
      outline: none;
    }

    .history {
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-right: 4px;
      min-height: 0;
      flex: 1;
    }

    .chat-item {
      border: 1px solid transparent;
      border-radius: 12px;
      background: rgba(9, 20, 39, 0.66);
      padding: 10px;
      cursor: pointer;
      text-align: left;
      color: inherit;
    }

    .chat-item:hover {
      border-color: var(--border);
    }

    .chat-item.active {
      border-color: rgba(70, 214, 191, 0.5);
      background: rgba(18, 48, 69, 0.72);
    }

    .chat-item .title {
      margin: 0;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-item .meta {
      margin: 4px 0 0;
      font-size: 11px;
      color: var(--text-muted);
    }

    .chat-item .snippet {
      margin: 6px 0 0;
      font-size: 11px;
      color: #c5d8ef;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .profile {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      background: var(--panel-soft);
    }

    .profile-name {
      margin: 0;
      font-weight: 600;
      font-size: 13px;
    }

    .profile-email {
      margin: 2px 0 10px;
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .profile-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .ghost-btn,
    .profile-actions button,
    .profile-actions a {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: rgba(9, 21, 40, 0.88);
      color: var(--text);
      padding: 7px 10px;
      font-size: 11px;
      text-decoration: none;
      cursor: pointer;
    }

    .main {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      position: relative;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px 22px;
      border-bottom: 1px solid var(--border);
      background: rgba(6, 15, 30, 0.5);
      backdrop-filter: blur(8px);
    }

    .top-left {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      letter-spacing: 0.03em;
    }

    .menu-btn {
      display: none;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: rgba(9, 21, 40, 0.88);
      color: var(--text);
      padding: 7px 10px;
      cursor: pointer;
    }

    .mode-pill {
      border-radius: 999px;
      border: 1px solid var(--border);
      padding: 5px 10px;
      font-size: 11px;
      color: var(--text-muted);
    }

    .thread-wrap {
      flex: 1;
      min-height: 0;
      display: flex;
      justify-content: center;
      overflow: auto;
      padding: 20px 12px 12px;
    }

    .thread {
      width: min(1060px, 100%);
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding-bottom: 24px;
    }

    .starter {
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      background: rgba(9, 24, 47, 0.55);
      padding: 20px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    .msg {
      display: flex;
      gap: 10px;
      width: 100%;
      animation: popIn .22s ease;
    }

    @keyframes popIn {
      from {
        transform: translateY(5px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .msg.user {
      justify-content: flex-end;
    }

    .bubble {
      max-width: min(860px, 92%);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .bubble-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 9px 14px;
      font-size: 11px;
      letter-spacing: 0.03em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
    }

    .bubble.user {
      background: linear-gradient(160deg, rgba(30, 62, 99, 0.95), var(--user-bubble));
    }

    .bubble.bot {
      background: linear-gradient(160deg, rgba(12, 37, 66, 0.93), var(--bot-bubble));
    }

    .bubble-body {
      padding: 14px 16px;
      line-height: 1.62;
      font-size: 16px;
    }

    .bubble-body p {
      margin: 0 0 10px;
    }

    .bubble-body p:last-child {
      margin-bottom: 0;
    }

    .assistant-steps {
      margin: 12px 0 0;
      padding-left: 18px;
      display: grid;
      gap: 6px;
      font-size: 14px;
      color: #d6e9ff;
    }

    .assistant-flags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .flag {
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 11px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: #fff;
    }

    .flag.warn {
      background: rgba(255, 183, 71, 0.16);
      border-color: rgba(255, 183, 71, 0.35);
      color: #ffdca0;
    }

    .flag.danger {
      background: rgba(255, 92, 92, 0.14);
      border-color: rgba(255, 92, 92, 0.35);
      color: #ffb6b6;
    }

    .agent-strip {
      width: min(1060px, 100%);
      margin: 0 auto;
      padding: 0 12px;
    }

    .agent-strip-inner {
      border: 1px solid var(--border);
      border-radius: 13px;
      background: rgba(8, 22, 43, 0.82);
      padding: 10px;
      display: none;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .agent-chip {
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 11px;
      padding: 4px 9px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(10, 23, 43, 0.8);
    }

    .agent-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #587392;
    }

    .agent-chip.running .agent-dot {
      background: var(--chip-run);
      box-shadow: 0 0 12px rgba(76, 201, 240, 0.75);
    }

    .agent-chip.done .agent-dot {
      background: var(--chip-done);
    }

    .agent-chip.failed .agent-dot {
      background: var(--chip-failed);
    }

    .composer-wrap {
      border-top: 1px solid var(--border);
      background: rgba(6, 14, 27, 0.84);
      backdrop-filter: blur(8px);
      padding: 12px;
    }

    .composer {
      width: min(1060px, 100%);
      margin: 0 auto;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: rgba(7, 20, 39, 0.95);
      padding: 10px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    .composer textarea {
      border: 0;
      outline: none;
      resize: none;
      background: transparent;
      color: var(--text);
      min-height: 68px;
      max-height: 180px;
      font: inherit;
      font-size: 15px;
      line-height: 1.5;
    }

    .composer-actions {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }

    .icon-btn,
    .send-btn {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(8, 22, 42, 0.9);
      color: var(--text);
      padding: 9px 12px;
      cursor: pointer;
      font-weight: 600;
      font-size: 12px;
    }

    .icon-btn.active {
      border-color: rgba(76, 201, 240, 0.9);
      color: #d8f6ff;
      box-shadow: 0 0 14px rgba(76, 201, 240, 0.42);
    }

    .send-btn {
      background: linear-gradient(90deg, var(--brand), #52f6e4);
      color: #082233;
      border: 0;
      min-width: 76px;
    }

    .composer-meta {
      width: min(1060px, 100%);
      margin: 8px auto 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      font-size: 11px;
    }

    .attachment-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 5px 10px;
      background: rgba(10, 24, 44, 0.9);
      max-width: 100%;
    }

    .attachment-pill span {
      max-width: 260px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .attachment-pill button {
      border: 0;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0;
      font-size: 12px;
    }

    .drawer-toggle {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: rgba(8, 22, 42, 0.9);
      color: var(--text-muted);
      padding: 7px 10px;
      font-size: 11px;
      cursor: pointer;
      display: none;
    }

    .drawer {
      position: fixed;
      right: 12px;
      top: 70px;
      width: min(390px, calc(100vw - 24px));
      max-height: calc(100vh - 84px);
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: rgba(5, 15, 31, 0.96);
      box-shadow: var(--shadow);
      padding: 12px;
      z-index: 40;
      display: none;
    }

    .drawer.visible {
      display: block;
    }

    .drawer h3 {
      margin: 0 0 8px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
    }

    .drawer pre {
      margin: 0;
      white-space: pre-wrap;
      font-size: 12px;
      line-height: 1.4;
      color: #bfd5ef;
    }

    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(2, 8, 16, 0.58);
      z-index: 15;
    }

    @media (max-width: 980px) {
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        width: min(86vw, 340px);
        transform: translateX(-110%);
        transition: transform .2s ease;
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .menu-btn {
        display: inline-flex;
      }

      .overlay.visible {
        display: block;
      }

      .bubble {
        max-width: 96%;
      }

      .composer {
        grid-template-columns: 1fr;
      }

      .composer-actions {
        justify-content: flex-end;
      }
    }
  </style>
</head>
<body>
  <div class="overlay" id="overlay"></div>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div>
          <small>TGCSB-Inspired Citizen Assist</small>
          <h1>SATARK AI</h1>
        </div>
        <span class="mode-pill" id="leftModePill">Citizen</span>
      </div>

      <button class="new-chat" id="newChatBtn" type="button">+ New Chat</button>

      <div class="search-wrap">
        <input id="chatSearch" type="search" placeholder="Search chats" />
      </div>

      <div class="history" id="historyList"></div>

      <div class="profile">
        <p class="profile-name" id="profileName">Guest</p>
        <p class="profile-email" id="profileEmail">Not signed in</p>
        <div class="profile-actions">
          <button type="button" id="signInBtn">Sign in with Google</button>
          <a href="/auth/google/logout" id="logoutBtn" style="display:none">Logout</a>
        </div>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="top-left">
          <button class="menu-btn" id="menuBtn" type="button">Menu</button>
          <span>SATARK Conversation</span>
        </div>
        <div style="display:flex; gap:8px; align-items:center">
          <span class="mode-pill" id="modePill">Citizen View</span>
          <button class="drawer-toggle" id="drawerToggle" type="button">Analyst Drawer</button>
        </div>
      </header>

      <section class="thread-wrap" id="threadWrap">
        <div class="thread" id="thread"></div>
      </section>

      <section class="agent-strip">
        <div class="agent-strip-inner" id="agentStrip"></div>
      </section>

      <section class="composer-wrap">
        <input id="fileInput" type="file" hidden />
        <div class="composer">
          <textarea id="composerInput" placeholder="Paste a suspicious message, explain the call, or ask SATARK for guidance."></textarea>
          <div class="composer-actions">
            <button class="icon-btn" id="uploadBtn" type="button">Upload</button>
            <button class="icon-btn" id="micBtn" type="button">Mic</button>
            <button class="sendBtn send-btn" id="sendBtn" type="button">Send</button>
          </div>
        </div>
        <div class="composer-meta">
          <div id="attachmentSlot"></div>
          <div id="composerHint">Enter to send, Shift+Enter for new line</div>
        </div>
      </section>
    </main>
  </div>

  <aside class="drawer" id="analystDrawer">
    <h3>Latest Analyst Trace</h3>
    <pre id="analystJson">No run yet.</pre>
  </aside>

  <script>
    const SESSION_STORAGE_KEY = 'satark_session_id';
    const ANALYST_MODE_KEY = 'satark_view_mode';

    const state = {
      sessionId: null,
      profile: {
        connected: false,
        email: null,
        name: 'Guest',
      },
      chats: [],
      activeChatId: null,
      selectedFile: null,
      search: '',
      isProcessing: false,
      currentRunId: null,
      evtSource: null,
      pollTimer: null,
      agentStatus: {},
      analystMode: false,
      drawerOpen: false,
      latestPayload: null,
      speechRec: null,
      recording: false,
      mediaRecorder: null,
      mediaChunks: [],
    };

    const AGENT_ORDER = ['manager', 'scam_detector', 'osint', 'audio_analyzer', 'apk_analyzer', 'golden_hour', 'google_calendar', 'google_tasks', 'google_gmail', 'google_docs'];

    function getSessionId() {
      if (state.sessionId) return state.sessionId;
      const existing = localStorage.getItem(SESSION_STORAGE_KEY);
      if (existing && existing.length > 8) {
        state.sessionId = existing;
        return existing;
      }
      const random = Math.random().toString(36).slice(2) + Date.now().toString(36);
      state.sessionId = 'sess_' + random;
      localStorage.setItem(SESSION_STORAGE_KEY, state.sessionId);
      return state.sessionId;
    }

    function isAnalystMode() {
      try {
        const params = new URLSearchParams(window.location.search || '');
        const explicit = String(params.get('view') || params.get('mode') || '').trim().toLowerCase();
        if (explicit === 'analyst' || explicit === 'debug') return true;
      } catch (_e) {}
      try {
        return String(localStorage.getItem(ANALYST_MODE_KEY) || '').trim().toLowerCase() === 'analyst';
      } catch (_e) {
        return false;
      }
    }

    function toFriendlyName(email) {
      const text = String(email || '').trim();
      if (!text) return 'Guest';
      const local = text.split('@')[0] || text;
      return local
        .split(/[._-]+/)
        .filter(Boolean)
        .map((part) => part.charAt(0).toUpperCase() + part.slice(1))
        .join(' ') || 'User';
    }

    function storageKey() {
      const id = (state.profile.email || 'guest').toLowerCase();
      return 'satark_chat_history_' + encodeURIComponent(id);
    }

    function saveChats() {
      try {
        localStorage.setItem(storageKey(), JSON.stringify(state.chats));
      } catch (_e) {}
    }

    function loadChats() {
      try {
        const raw = localStorage.getItem(storageKey());
        state.chats = raw ? JSON.parse(raw) : [];
        if (!Array.isArray(state.chats)) state.chats = [];
      } catch (_e) {
        state.chats = [];
      }
      if (!state.chats.length) {
        const starter = createChat('New SATARK chat');
        state.chats = [starter];
        state.activeChatId = starter.id;
        saveChats();
      }
      if (!state.activeChatId || !state.chats.some((c) => c.id === state.activeChatId)) {
        state.activeChatId = state.chats[0].id;
      }
    }

    function createChat(title) {
      const now = new Date().toISOString();
      return {
        id: 'chat_' + Math.random().toString(36).slice(2) + Date.now().toString(36),
        title: title || 'New chat',
        createdAt: now,
        updatedAt: now,
        messages: [],
      };
    }

    function getActiveChat() {
      return state.chats.find((c) => c.id === state.activeChatId) || null;
    }

    function updateChat(chat) {
      const idx = state.chats.findIndex((c) => c.id === chat.id);
      if (idx >= 0) state.chats[idx] = chat;
      chat.updatedAt = new Date().toISOString();
      state.chats.sort((a, b) => String(b.updatedAt).localeCompare(String(a.updatedAt)));
      saveChats();
    }

    function formatTime(iso) {
      if (!iso) return '';
      try {
        return new Date(iso).toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
      } catch (_e) {
        return '';
      }
    }

    function textPreview(text, maxLen = 90) {
      const clean = String(text || '').replace(/\s+/g, ' ').trim();
      if (clean.length <= maxLen) return clean;
      return clean.slice(0, maxLen - 1) + '...';
    }

    function makeTitleFromText(text) {
      const src = String(text || '').toLowerCase();
      if (src.includes('kyc')) return 'Suspicious KYC SMS';
      if (src.includes('otp') && (src.includes('lost') || src.includes('debited'))) return 'OTP shared and money lost';
      if (src.includes('upi') && src.includes('lost')) return 'UPI money lost case';
      if (src.includes('lottery') || src.includes('prize')) return 'Lottery message check';
      if (src.includes('bank')) return 'Bank message check';
      const words = String(text || '').replace(/\s+/g, ' ').trim().split(' ').slice(0, 5).join(' ');
      return words ? words.charAt(0).toUpperCase() + words.slice(1) : 'New SATARK chat';
    }

    function sanitizeCitizenText(text) {
      let out = String(text || '').trim();
      if (!out) return out;
      out = out.replace(/from your answers,?/ig, '').replace(/\s{2,}/g, ' ').trim();
      out = out.replace(/\buser should\b/ig, 'you should');
      return out;
    }

    function renderHistory() {
      const host = document.getElementById('historyList');
      host.innerHTML = '';
      const query = state.search.toLowerCase().trim();
      const items = state.chats.filter((chat) => {
        if (!query) return true;
        const blob = [chat.title, ...(chat.messages || []).map((m) => m.text || '')].join(' ').toLowerCase();
        return blob.includes(query);
      });

      if (!items.length) {
        const empty = document.createElement('div');
        empty.className = 'chat-item';
        empty.innerHTML = '<p class="title">No chats found</p><p class="meta">Try another keyword.</p>';
        host.appendChild(empty);
        return;
      }

      for (const chat of items) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'chat-item' + (chat.id === state.activeChatId ? ' active' : '');
        const last = (chat.messages || []).slice(-1)[0];
        btn.innerHTML = `
          <p class="title">${escapeHtml(chat.title || 'Untitled')}</p>
          <p class="meta">${escapeHtml(formatTime(chat.updatedAt || chat.createdAt))}</p>
          <p class="snippet">${escapeHtml(textPreview(last ? last.text : 'No messages yet'))}</p>
        `;
        btn.addEventListener('click', () => {
          state.activeChatId = chat.id;
          closeSidebarOnMobile();
          render();
        });
        host.appendChild(btn);
      }
    }

    function renderThread() {
      const thread = document.getElementById('thread');
      const chat = getActiveChat();
      thread.innerHTML = '';
      if (!chat || !chat.messages.length) {
        const starter = document.createElement('div');
        starter.className = 'starter';
        starter.innerHTML = [
          '<strong>Chat with SATARK AI</strong>',
          'Paste suspicious text, attach evidence, or dictate by mic.',
          'You will get one clear response with simple explanation and practical steps.',
        ].join('<br>');
        thread.appendChild(starter);
        return;
      }

      for (const msg of chat.messages) {
        const row = document.createElement('div');
        row.className = 'msg ' + (msg.role === 'user' ? 'user' : 'bot');

        const bubble = document.createElement('div');
        bubble.className = 'bubble ' + (msg.role === 'user' ? 'user' : 'bot');

        const head = document.createElement('div');
        head.className = 'bubble-head';
        const label = msg.role === 'user' ? state.profile.name : 'SATARK AI';
        head.innerHTML = `<span>${escapeHtml(label)}</span><span>${escapeHtml(formatTime(msg.ts))}</span>`;

        const body = document.createElement('div');
        body.className = 'bubble-body';
        const text = sanitizeCitizenText(msg.text || '');
        body.innerHTML = text ? `<p>${escapeHtml(text)}</p>` : '<p>(No text)</p>';

        if (msg.role === 'assistant' && Array.isArray(msg.steps) && msg.steps.length) {
          const list = document.createElement('ol');
          list.className = 'assistant-steps';
          for (const step of msg.steps.slice(0, 4)) {
            const li = document.createElement('li');
            li.textContent = sanitizeCitizenText(step);
            list.appendChild(li);
          }
          body.appendChild(list);
        }

        if (msg.role === 'assistant' && Array.isArray(msg.flags) && msg.flags.length) {
          const flags = document.createElement('div');
          flags.className = 'assistant-flags';
          for (const f of msg.flags) {
            const item = document.createElement('span');
            item.className = 'flag ' + (f.level || 'warn');
            item.textContent = f.text;
            flags.appendChild(item);
          }
          body.appendChild(flags);
        }

        bubble.appendChild(head);
        bubble.appendChild(body);
        row.appendChild(bubble);
        thread.appendChild(row);
      }

      requestAnimationFrame(() => {
        const wrap = document.getElementById('threadWrap');
        wrap.scrollTop = wrap.scrollHeight;
      });
    }

    function renderAgentStrip() {
      const strip = document.getElementById('agentStrip');
      strip.innerHTML = '';
      const keys = Object.keys(state.agentStatus);
      if (!state.isProcessing || !keys.length) {
        strip.style.display = 'none';
        return;
      }

      strip.style.display = 'flex';
      for (const name of AGENT_ORDER) {
        if (!state.agentStatus[name]) continue;
        const s = state.agentStatus[name];
        const chip = document.createElement('div');
        chip.className = 'agent-chip ' + (s.state || 'idle');
        const label = name.replaceAll('_', ' ');
        chip.innerHTML = `<span class="agent-dot"></span><span>${escapeHtml(label)}: ${escapeHtml(s.label || s.state)}</span>`;
        strip.appendChild(chip);
      }
    }

    function renderProfile() {
      document.getElementById('profileName').textContent = state.profile.name;
      document.getElementById('profileEmail').textContent = state.profile.email || 'Not signed in';
      document.getElementById('signInBtn').style.display = state.profile.connected ? 'none' : 'inline-block';
      document.getElementById('logoutBtn').style.display = state.profile.connected ? 'inline-block' : 'none';
    }

    function renderAttachment() {
      const slot = document.getElementById('attachmentSlot');
      slot.innerHTML = '';
      if (!state.selectedFile) return;
      const pill = document.createElement('div');
      pill.className = 'attachment-pill';
      pill.innerHTML = `<span>${escapeHtml(state.selectedFile.name)} (${Math.round(state.selectedFile.size / 1024)} KB)</span>`;
      const clear = document.createElement('button');
      clear.type = 'button';
      clear.textContent = 'Remove';
      clear.addEventListener('click', () => {
        state.selectedFile = null;
        renderAttachment();
      });
      pill.appendChild(clear);
      slot.appendChild(pill);
    }

    function renderMode() {
      const text = state.analystMode ? 'Analyst View' : 'Citizen View';
      document.getElementById('modePill').textContent = text;
      document.getElementById('leftModePill').textContent = state.analystMode ? 'Analyst' : 'Citizen';
      const drawerToggle = document.getElementById('drawerToggle');
      drawerToggle.style.display = state.analystMode ? 'inline-block' : 'none';
      if (!state.analystMode) {
        document.getElementById('analystDrawer').classList.remove('visible');
        state.drawerOpen = false;
      }
    }

    function renderAnalystDrawer() {
      if (!state.analystMode) return;
      const el = document.getElementById('analystJson');
      el.textContent = state.latestPayload ? JSON.stringify(state.latestPayload, null, 2) : 'No run yet.';
    }

    function render() {
      renderProfile();
      renderMode();
      renderHistory();
      renderThread();
      renderAgentStrip();
      renderAttachment();
      renderAnalystDrawer();
    }

    function escapeHtml(text) {
      return String(text || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function setAgentState(agent, stateName, label) {
      if (!agent) return;
      state.agentStatus[agent] = {
        state: stateName,
        label: label || stateName,
      };
      renderAgentStrip();
    }

    function addMessage(role, text, extra = {}) {
      const chat = getActiveChat();
      if (!chat) return;
      chat.messages.push({
        role,
        text: sanitizeCitizenText(text),
        ts: new Date().toISOString(),
        steps: extra.steps || null,
        flags: extra.flags || null,
        runId: extra.runId || null,
      });
      if (chat.messages.length === 1 && role === 'user') {
        chat.title = makeTitleFromText(text);
      }
      updateChat(chat);
      render();
    }

    async function fileToDataUrl(file) {
      return await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ''));
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function closeStreamAndPoll() {
      if (state.evtSource) {
        try { state.evtSource.close(); } catch (_e) {}
        state.evtSource = null;
      }
      if (state.pollTimer) {
        clearInterval(state.pollTimer);
        state.pollTimer = null;
      }
    }

    function buildAssistantPayload(result) {
      const cleanSummary = sanitizeCitizenText(result.summary || result.conversational_reply || 'Analysis complete.');
      const cleanReply = sanitizeCitizenText(result.conversational_reply || result.summary || 'Please review the action steps below.');
      const recommended = Array.isArray(result.recommended_actions) ? result.recommended_actions : [];
      const steps = recommended.map((x) => sanitizeCitizenText(String(x || '').trim())).filter(Boolean).slice(0, 4);

      const flags = [];
      if (result.requires_emergency) flags.push({ text: 'Act now', level: 'danger' });
      if (result.requires_reporting) flags.push({ text: 'Report guidance', level: 'warn' });
      if (result.requires_financial_blocking || result.requires_account_block) flags.push({ text: 'Protect accounts', level: 'warn' });

      const reason = result.reporting_recommendation && result.reporting_recommendation.reason
        ? sanitizeCitizenText(result.reporting_recommendation.reason)
        : '';

      let text = cleanSummary;
      if (cleanReply && cleanReply !== cleanSummary) {
        text += '\n\n' + cleanReply;
      }
      if (reason && result.requires_reporting) {
        text += '\n\n' + reason;
      }

      return { text, steps, flags };
    }

    function startStream(runId) {
      closeStreamAndPoll();
      state.agentStatus = {};
      renderAgentStrip();

      const src = new EventSource('/api/stream/' + encodeURIComponent(runId));
      state.evtSource = src;

      src.addEventListener('run.classified', (evt) => {
        try {
          const data = JSON.parse(evt.data || '{}');
          const selected = Array.isArray(data.selected_agents) ? data.selected_agents : [];
          setAgentState('manager', 'running', 'starting');
          for (const name of selected) setAgentState(String(name || ''), 'running', 'queued');
        } catch (_e) {}
      });

      src.addEventListener('agent.started', (evt) => {
        try {
          const data = JSON.parse(evt.data || '{}');
          const agent = String(data.agent || '').trim();
          if (agent) setAgentState(agent, 'running', 'running');
        } catch (_e) {}
      });

      src.addEventListener('agent.completed', (evt) => {
        try {
          const data = JSON.parse(evt.data || '{}');
          const agent = String(data.agent || '').trim();
          if (!agent) return;
          const status = String(data.status || 'done').toLowerCase();
          if (status === 'failed') setAgentState(agent, 'failed', 'failed');
          else if (status === 'skipped') setAgentState(agent, 'done', 'skipped');
          else setAgentState(agent, 'done', 'done');
        } catch (_e) {}
      });

      src.addEventListener('run.failed', () => {
        state.isProcessing = false;
        render();
        closeStreamAndPoll();
      });

      src.onerror = () => {
        try { src.close(); } catch (_e) {}
      };
    }

    async function waitForResult(runId) {
      return await new Promise((resolve, reject) => {
        let attempts = 0;
        const maxAttempts = 90;
        state.pollTimer = setInterval(async () => {
          attempts += 1;
          if (attempts > maxAttempts) {
            clearInterval(state.pollTimer);
            state.pollTimer = null;
            reject(new Error('Analysis timed out'));
            return;
          }

          try {
            const res = await fetch('/api/result/' + encodeURIComponent(runId));
            if (res.status === 202) return;
            if (!res.ok) throw new Error('Could not fetch result');
            const data = await res.json();
            clearInterval(state.pollTimer);
            state.pollTimer = null;
            resolve(data);
          } catch (err) {
            clearInterval(state.pollTimer);
            state.pollTimer = null;
            reject(err);
          }
        }, 1800);
      });
    }

    async function sendMessage() {
      if (state.isProcessing) return;
      const input = document.getElementById('composerInput');
      const text = String(input.value || '').trim();
      if (!text && !state.selectedFile) {
        input.focus();
        return;
      }

      if (!getActiveChat()) {
        const chat = createChat('New SATARK chat');
        state.chats.unshift(chat);
        state.activeChatId = chat.id;
      }

      addMessage('user', text || '(Sent file evidence)');
      input.value = '';
      renderAttachment();
      state.isProcessing = true;
      document.getElementById('composerHint').textContent = 'SATARK is working...';
      renderAgentStrip();

      try {
        const files = [];
        if (state.selectedFile) {
          const dataUrl = await fileToDataUrl(state.selectedFile);
          files.push({
            file_name: state.selectedFile.name,
            file_type: state.selectedFile.type || 'application/octet-stream',
            content_base64: dataUrl,
          });
        }

        const payload = {
          session_id: getSessionId(),
          user_input: {
            text,
            files,
          },
          user_context: {
            channel: 'web-ui',
            locale: navigator.language || 'en-IN',
          },
          options: {
            stream: true,
            generate_report: true,
            trigger_mcp_actions: false,
          },
        };

        const analyzeRes = await fetch('/api/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });

        if (!analyzeRes.ok) {
          throw new Error('Could not start analysis');
        }

        const ack = await analyzeRes.json();
        const runId = String(ack.run_id || '').trim();
        if (!runId) throw new Error('Missing run id');
        state.currentRunId = runId;
        startStream(runId);

        const result = await waitForResult(runId);
        state.latestPayload = result;

        const assistant = buildAssistantPayload(result || {});
        addMessage('assistant', assistant.text, {
          steps: assistant.steps,
          flags: assistant.flags,
          runId,
        });

        const chat = getActiveChat();
        if (chat && chat.messages.length >= 2) {
          const firstUser = chat.messages.find((m) => m.role === 'user');
          if (firstUser) {
            chat.title = makeTitleFromText(firstUser.text);
            updateChat(chat);
          }
        }

        state.selectedFile = null;
      } catch (_err) {
        addMessage('assistant', 'I could not finish this request right now. Please try again in a moment.');
      } finally {
        state.isProcessing = false;
        document.getElementById('composerHint').textContent = 'Enter to send, Shift+Enter for new line';
        closeStreamAndPoll();
        render();
      }
    }

    async function checkAuth() {
      try {
        const res = await fetch('/api/auth/status');
        const data = await res.json();
        state.profile.connected = !!data.connected;
        state.profile.email = data.email || null;
        state.profile.name = toFriendlyName(state.profile.email);
      } catch (_e) {
        state.profile.connected = false;
        state.profile.email = null;
        state.profile.name = 'Guest';
      }
    }

    function setupMic() {
      const micBtn = document.getElementById('micBtn');
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

      if (SpeechRecognition) {
        const recog = new SpeechRecognition();
        recog.lang = navigator.language || 'en-IN';
        recog.interimResults = true;
        recog.maxAlternatives = 1;
        recog.continuous = false;
        state.speechRec = recog;

        recog.onresult = (event) => {
          const textarea = document.getElementById('composerInput');
          let finalText = '';
          for (let i = event.resultIndex; i < event.results.length; i += 1) {
            finalText += event.results[i][0].transcript;
          }
          textarea.value = (textarea.value + ' ' + finalText).replace(/\s+/g, ' ').trim();
        };

        recog.onstart = () => {
          state.recording = true;
          micBtn.classList.add('active');
          document.getElementById('composerHint').textContent = 'Listening... Speak now';
        };

        recog.onend = () => {
          state.recording = false;
          micBtn.classList.remove('active');
          document.getElementById('composerHint').textContent = 'Enter to send, Shift+Enter for new line';
        };

        micBtn.addEventListener('click', () => {
          if (state.recording) {
            recog.stop();
            return;
          }
          recog.start();
        });
        return;
      }

      // Backend-ready path for Google Cloud Speech streaming.
      micBtn.addEventListener('click', async () => {
        if (state.recording && state.mediaRecorder) {
          state.mediaRecorder.stop();
          return;
        }
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          const recorder = new MediaRecorder(stream);
          state.mediaChunks = [];
          state.mediaRecorder = recorder;
          recorder.ondataavailable = (evt) => {
            if (evt.data && evt.data.size > 0) state.mediaChunks.push(evt.data);
          };
          recorder.onstart = () => {
            state.recording = true;
            micBtn.classList.add('active');
            document.getElementById('composerHint').textContent = 'Recording... click Mic to stop';
          };
          recorder.onstop = async () => {
            state.recording = false;
            micBtn.classList.remove('active');
            document.getElementById('composerHint').textContent = 'Enter to send, Shift+Enter for new line';
            const blob = new Blob(state.mediaChunks, { type: 'audio/webm' });
            // Placeholder for server endpoint: POST blob to backend for Google Cloud STT.
            console.info('Audio captured for backend STT path', blob.size);
            stream.getTracks().forEach((t) => t.stop());
          };
          recorder.start();
        } catch (_e) {
          document.getElementById('composerHint').textContent = 'Mic access denied in this browser';
        }
      });
    }

    async function bootstrap() {
      state.analystMode = isAnalystMode();
      await checkAuth();
      loadChats();
      render();

      const input = document.getElementById('composerInput');
      input.addEventListener('keydown', (evt) => {
        if (evt.key === 'Enter' && !evt.shiftKey) {
          evt.preventDefault();
          sendMessage();
        }
      });

      document.getElementById('sendBtn').addEventListener('click', sendMessage);
      document.getElementById('newChatBtn').addEventListener('click', () => {
        const chat = createChat('New SATARK chat');
        state.chats.unshift(chat);
        state.activeChatId = chat.id;
        saveChats();
        closeSidebarOnMobile();
        render();
      });

      document.getElementById('chatSearch').addEventListener('input', (evt) => {
        state.search = String(evt.target.value || '');
        renderHistory();
      });

      document.getElementById('uploadBtn').addEventListener('click', () => {
        document.getElementById('fileInput').click();
      });

      document.getElementById('fileInput').addEventListener('change', (evt) => {
        const file = evt.target.files && evt.target.files[0] ? evt.target.files[0] : null;
        state.selectedFile = file;
        renderAttachment();
      });

      document.getElementById('signInBtn').addEventListener('click', () => {
        const sid = getSessionId();
        window.location.href = '/auth/google/start?session_id=' + encodeURIComponent(sid) + '&next=/ui';
      });

      document.getElementById('drawerToggle').addEventListener('click', () => {
        state.drawerOpen = !state.drawerOpen;
        document.getElementById('analystDrawer').classList.toggle('visible', state.drawerOpen);
      });

      document.getElementById('menuBtn').addEventListener('click', () => {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('visible');
      });

      document.getElementById('overlay').addEventListener('click', closeSidebarOnMobile);

      setupMic();

      const params = new URLSearchParams(window.location.search);
      if (params.get('google') === 'connected') {
        window.history.replaceState({}, '', '/ui');
      }
    }

    function closeSidebarOnMobile() {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('overlay').classList.remove('visible');
    }

    bootstrap();
  </script>
</body>
</html>
