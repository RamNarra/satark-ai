<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SATARK AI Chat</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

    :root {
      --bg-deep: #061426;
      --bg-mid: #0b1f36;
      --panel: rgba(9, 21, 40, 0.9);
      --panel-soft: rgba(10, 25, 45, 0.72);
      --border: rgba(120, 180, 220, 0.22);
      --text: #e5f0ff;
      --text-muted: #9bb4d1;
      --brand: #20e3c2;
      --brand-deep: #1cb0a4;
      --user-bubble: #1c3a64;
      --bot-bubble: #0f2d4e;
      --chip-run: #4cc9f0;
      --chip-done: #3ddc97;
      --chip-failed: #ff6b6b;
      --warn: #ffb347;
      --danger: #ff5c5c;
      --radius: 18px;
      --shadow: 0 16px 40px rgba(0, 0, 0, 0.26);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: 'IBM Plex Sans', sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 800px at 10% -20%, rgba(39, 118, 202, 0.28), transparent),
        radial-gradient(900px 700px at 85% -10%, rgba(38, 170, 150, 0.20), transparent),
        linear-gradient(140deg, var(--bg-deep), var(--bg-mid));
    }

    body {
      overscroll-behavior: none;
    }

    .app {
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      height: 100dvh;
      overflow: hidden;
      position: relative;
    }

    .sidebar {
      background: linear-gradient(180deg, rgba(10, 25, 48, 0.96), rgba(8, 18, 35, 0.93));
      border-right: 1px solid var(--border);
      padding: 18px 14px 14px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      backdrop-filter: blur(12px);
      z-index: 20;
      min-height: 0;
      overflow: hidden;
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--panel-soft);
    }

    .brand h1 {
      margin: 0;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 20px;
      letter-spacing: 0.04em;
    }

    .brand small {
      color: var(--text-muted);
      font-size: 11px;
    }

    .new-chat {
      border: 0;
      border-radius: 12px;
      padding: 12px;
      font-weight: 700;
      color: #012330;
      background: linear-gradient(90deg, var(--brand), #7fffd4);
      cursor: pointer;
      transition: transform .15s ease;
    }

    .new-chat:hover {
      transform: translateY(-1px);
    }

    .search-wrap input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(7, 19, 36, 0.8);
      color: var(--text);
      padding: 10px 12px;
      outline: none;
    }

    .history {
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-right: 4px;
      min-height: 0;
      flex: 1 1 auto;
    }

    .chat-item {
      border: 1px solid transparent;
      border-radius: 12px;
      background: rgba(9, 20, 39, 0.66);
      padding: 10px;
      cursor: pointer;
      text-align: left;
      color: inherit;
    }

    .chat-item:hover {
      border-color: var(--border);
    }

    .chat-item.active {
      border-color: rgba(70, 214, 191, 0.5);
      background: rgba(18, 48, 69, 0.72);
    }

    .chat-item .title {
      margin: 0;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-item .meta {
      margin: 4px 0 0;
      font-size: 11px;
      color: var(--text-muted);
    }

    .chat-item .snippet {
      margin: 6px 0 0;
      font-size: 11px;
      color: #c5d8ef;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .profile {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      background: var(--panel-soft);
    }

    .profile-name {
      margin: 0;
      font-weight: 600;
      font-size: 13px;
    }

    .profile-email {
      margin: 2px 0 10px;
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .profile-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .ghost-btn,
    .profile-actions button,
    .profile-actions a {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: rgba(9, 21, 40, 0.88);
      color: var(--text);
      padding: 7px 10px;
      font-size: 11px;
      text-decoration: none;
      cursor: pointer;
    }

    .main {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      min-height: 0;
      overflow: hidden;
      position: relative;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px 22px;
      border-bottom: 1px solid var(--border);
      background: rgba(6, 15, 30, 0.5);
      backdrop-filter: blur(8px);
    }

    .top-left {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      letter-spacing: 0.03em;
    }

    .menu-btn {
      display: none;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: rgba(9, 21, 40, 0.88);
      color: var(--text);
      padding: 7px 10px;
      cursor: pointer;
    }

    .mode-pill {
      border-radius: 999px;
      border: 1px solid var(--border);
      padding: 5px 10px;
      font-size: 11px;
      color: var(--text-muted);
    }

    .thread-wrap {
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      justify-content: center;
      overflow-y: auto;
      overflow-x: hidden;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
      padding: 20px 12px 12px;
      position: relative;
    }

    .thread {
      width: min(1060px, 100%);
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding-bottom: 24px;
    }

    .starter {
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      background: rgba(9, 24, 47, 0.55);
      padding: 20px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    .msg {
      display: flex;
      gap: 10px;
      width: 100%;
      animation: popIn .22s ease;
    }

    @keyframes popIn {
      from {
        transform: translateY(5px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .msg.user {
      justify-content: flex-end;
    }

    .bubble {
      max-width: min(860px, 92%);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .bubble-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 9px 14px;
      font-size: 11px;
      letter-spacing: 0.03em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
    }

    .bubble.user {
      background: linear-gradient(160deg, rgba(30, 62, 99, 0.95), var(--user-bubble));
    }

    .bubble.bot {
      background: linear-gradient(160deg, rgba(12, 37, 66, 0.93), var(--bot-bubble));
    }

    .bubble-body {
      padding: 14px 16px;
      line-height: 1.62;
      font-size: 16px;
    }

    .bubble-body p {
      margin: 0 0 10px;
    }

    .bubble-body p:last-child {
      margin-bottom: 0;
    }

    .assistant-steps {
      margin: 12px 0 0;
      padding-left: 18px;
      display: grid;
      gap: 6px;
      font-size: 14px;
      color: #d6e9ff;
    }

    .assistant-flags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .integration-panel {
      margin-top: 12px;
      border: 1px solid rgba(124, 216, 255, 0.25);
      border-radius: 10px;
      background: rgba(10, 31, 52, 0.78);
      padding: 10px;
    }

    .integration-panel-head {
      margin: 0 0 8px;
      font-size: 12px;
      color: #c8e8ff;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .integration-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .integration-item {
      border: 1px solid rgba(138, 178, 210, 0.25);
      border-radius: 9px;
      padding: 8px;
      background: rgba(8, 23, 41, 0.82);
    }

    .integration-item-title {
      margin: 0 0 4px;
      font-size: 11px;
      color: #d6ebff;
      font-weight: 600;
    }

    .integration-item-status {
      margin: 0;
      font-size: 11px;
      color: #a9c7df;
    }

    .integration-item-status.ok {
      color: #bfffd7;
    }

    .integration-item-status.warn {
      color: #ffd8aa;
    }

    .integration-links {
      margin-top: 8px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .integration-link {
      border: 1px solid rgba(124, 216, 255, 0.35);
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 11px;
      color: #d2edff;
      background: rgba(11, 36, 60, 0.9);
      text-decoration: none;
    }

    .integration-link:hover {
      border-color: rgba(124, 216, 255, 0.6);
      background: rgba(16, 46, 74, 0.95);
    }

    @media (max-width: 620px) {
      .integration-grid {
        grid-template-columns: 1fr;
      }
    }

    .clarification-wrap {
      margin-top: 12px;
      padding: 10px;
      border: 1px solid rgba(123, 213, 255, 0.28);
      border-radius: 12px;
      background: rgba(12, 29, 51, 0.8);
    }

    .clarification-question {
      margin: 0 0 6px;
      font-size: 14px;
      font-weight: 600;
      color: #e7f4ff;
    }

    .clarification-why {
      margin: 0 0 8px;
      font-size: 12px;
      color: #b4d9ff;
    }

    .clarification-options {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .clarification-btn {
      border: 1px solid rgba(123, 213, 255, 0.35);
      border-radius: 999px;
      background: rgba(22, 51, 84, 0.92);
      color: #e4f3ff;
      padding: 6px 12px;
      font-size: 12px;
      cursor: pointer;
    }

    .clarification-btn.selected {
      border-color: rgba(125, 245, 182, 0.65);
      background: rgba(19, 68, 44, 0.9);
      color: #c4ffd9;
    }

    .clarification-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .clarification-selected {
      margin: 0 0 8px;
      font-size: 12px;
      color: #c4ffd9;
    }

    .clarification-pending {
      margin-top: 10px;
      padding: 8px;
      border: 1px solid rgba(123, 213, 255, 0.24);
      border-radius: 10px;
      background: rgba(8, 24, 46, 0.86);
    }

    .clarification-pending-bar {
      position: relative;
      overflow: hidden;
      height: 6px;
      border-radius: 999px;
      background: rgba(123, 213, 255, 0.18);
    }

    .clarification-pending-bar::before {
      content: '';
      position: absolute;
      inset: 0;
      transform: translateX(-100%);
      background: linear-gradient(90deg, rgba(123, 213, 255, 0.1), rgba(173, 241, 255, 0.92), rgba(123, 213, 255, 0.1));
      animation: clarificationShimmer 1.1s linear infinite;
    }

    .clarification-pending-text {
      margin: 8px 0 0;
      font-size: 12px;
      color: #b4d9ff;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .clarification-pending-text::after {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #9fd7ff;
      box-shadow: 10px 0 0 rgba(159, 215, 255, 0.65), 20px 0 0 rgba(159, 215, 255, 0.4);
      animation: clarificationDots 1s ease-in-out infinite;
    }

    .clarification-reasoning {
      margin-top: 10px;
    }

    @keyframes clarificationShimmer {
      100% { transform: translateX(100%); }
    }

    @keyframes clarificationDots {
      0%, 100% { opacity: 0.45; }
      50% { opacity: 1; }
    }

    .jump-latest-btn {
      position: absolute;
      right: 18px;
      bottom: 14px;
      border: 1px solid rgba(123, 213, 255, 0.42);
      border-radius: 999px;
      background: rgba(8, 24, 46, 0.94);
      color: #d8edff;
      padding: 8px 12px;
      font-size: 12px;
      cursor: pointer;
      display: none;
      z-index: 5;
    }

    .jump-latest-btn.visible {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .flag {
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 11px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: #fff;
    }

    .flag.warn {
      background: rgba(255, 183, 71, 0.16);
      border-color: rgba(255, 183, 71, 0.35);
      color: #ffdca0;
    }

    .flag.danger {
      background: rgba(255, 92, 92, 0.14);
      border-color: rgba(255, 92, 92, 0.35);
      color: #ffb6b6;
    }

    .agent-strip {
      width: min(1060px, 100%);
      margin: 0 auto;
      padding: 0 12px;
    }

    .agent-strip-inner {
      border: 1px solid var(--border);
      border-radius: 13px;
      background: rgba(8, 22, 43, 0.82);
      padding: 10px;
      display: none;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .agent-chip {
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 11px;
      padding: 4px 9px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(10, 23, 43, 0.8);
    }

    .agent-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #587392;
    }

    .agent-chip.running .agent-dot {
      background: var(--chip-run);
      box-shadow: 0 0 12px rgba(76, 201, 240, 0.75);
    }

    .agent-chip.done .agent-dot {
      background: var(--chip-done);
    }

    .agent-chip.failed .agent-dot {
      background: var(--chip-failed);
    }

    .composer-wrap {
      border-top: 1px solid var(--border);
      background: rgba(6, 14, 27, 0.84);
      backdrop-filter: blur(8px);
      padding: 12px;
    }

    .composer {
      width: min(1060px, 100%);
      margin: 0 auto;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: rgba(7, 20, 39, 0.95);
      padding: 10px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    .composer textarea {
      border: 0;
      outline: none;
      resize: none;
      background: transparent;
      color: var(--text);
      min-height: 68px;
      max-height: 180px;
      font: inherit;
      font-size: 15px;
      line-height: 1.5;
    }

    .composer-actions {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }

    .icon-btn,
    .send-btn {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(8, 22, 42, 0.9);
      color: var(--text);
      padding: 9px 12px;
      cursor: pointer;
      font-weight: 600;
      font-size: 12px;
    }

    .icon-btn.active {
      border-color: rgba(76, 201, 240, 0.9);
      color: #d8f6ff;
      box-shadow: 0 0 14px rgba(76, 201, 240, 0.42);
    }

    .send-btn {
      background: linear-gradient(90deg, var(--brand), #52f6e4);
      color: #082233;
      border: 0;
      min-width: 76px;
    }

    .composer-meta {
      width: min(1060px, 100%);
      margin: 8px auto 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      font-size: 11px;
    }

    .attachment-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 5px 10px;
      background: rgba(10, 24, 44, 0.9);
      max-width: 100%;
    }

    .attachment-pill span {
      max-width: 260px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .attachment-pill button {
      border: 0;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0;
      font-size: 12px;
    }

    .msg-attachments {
      margin-top: 10px;
      display: grid;
      gap: 8px;
    }

    .msg-attachment-card {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(8, 22, 42, 0.78);
      padding: 8px 10px;
      display: block;
      gap: 10px;
    }

    .msg-attachment-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .msg-attachment-preview {
      width: 100%;
      max-width: 290px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      display: block;
      object-fit: cover;
      margin-bottom: 8px;
      background: rgba(0, 0, 0, 0.22);
    }

    .msg-attachment-meta {
      min-width: 0;
    }

    .msg-attachment-name {
      margin: 0;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .msg-attachment-sub {
      margin: 3px 0 0;
      font-size: 11px;
      color: var(--text-muted);
    }

    .attachment-badge {
      border-radius: 999px;
      border: 1px solid var(--border);
      padding: 3px 8px;
      font-size: 10px;
      letter-spacing: 0.04em;
      color: #c8e1ff;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .msg-meta-note {
      margin: 8px 0 0;
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.4;
    }

    .bubble-body a {
      color: #8ed7ff;
      text-decoration: underline;
    }

    .stage-meta-strip {
      margin-top: 8px;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: rgba(8, 22, 42, 0.65);
      font-size: 11px;
      color: #b9d3ef;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .stage-chip {
      border: 1px solid rgba(123, 213, 255, 0.35);
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 10px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #d6ecff;
    }

    .deep-action-wrap {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .deep-action-btn {
      border: 1px solid rgba(123, 213, 255, 0.4);
      border-radius: 999px;
      background: rgba(16, 44, 72, 0.9);
      color: #e6f4ff;
      padding: 7px 12px;
      font-size: 12px;
      cursor: pointer;
    }

    .deep-action-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .msg-technical-details {
      margin-top: 10px;
      border-top: 1px dashed var(--border);
      padding-top: 8px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .msg-technical-details summary {
      cursor: pointer;
      color: #9bc2ff;
      font-size: 12px;
    }

    .msg-technical-details ul {
      margin: 8px 0 0 16px;
      padding: 0;
      display: grid;
      gap: 4px;
    }

    .drawer-toggle {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: rgba(8, 22, 42, 0.9);
      color: var(--text-muted);
      padding: 7px 10px;
      font-size: 11px;
      cursor: pointer;
      display: none;
    }

    .drawer {
      position: fixed;
      right: 12px;
      top: 70px;
      width: min(390px, calc(100vw - 24px));
      max-height: calc(100vh - 84px);
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: rgba(5, 15, 31, 0.96);
      box-shadow: var(--shadow);
      padding: 12px;
      z-index: 40;
      display: none;
    }

    .drawer.visible {
      display: block;
    }

    .drawer h3 {
      margin: 0 0 8px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
    }

    .drawer pre {
      margin: 0;
      white-space: pre-wrap;
      font-size: 12px;
      line-height: 1.4;
      color: #bfd5ef;
    }

    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(2, 8, 16, 0.58);
      z-index: 15;
    }

    .upload-toast {
      position: fixed;
      left: 50%;
      bottom: 92px;
      transform: translate(-50%, 16px);
      border: 1px solid rgba(123, 213, 255, 0.36);
      border-radius: 999px;
      background: rgba(8, 24, 46, 0.96);
      color: #e4f3ff;
      padding: 8px 14px;
      font-size: 12px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease, transform .18s ease;
      z-index: 70;
    }

    .upload-toast.visible {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    @media (max-width: 980px) {
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        width: min(86vw, 340px);
        transform: translateX(-110%);
        transition: transform .2s ease;
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .menu-btn {
        display: inline-flex;
      }

      .overlay.visible {
        display: block;
      }

      .bubble {
        max-width: 96%;
      }

      .composer {
        grid-template-columns: 1fr;
      }

      .composer-actions {
        justify-content: flex-end;
      }
    }
  </style>
</head>
<body>
  <div class="overlay" id="overlay"></div>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div>
          <small>TGCSB-Inspired Citizen Assist</small>
          <h1>SATARK AI</h1>
        </div>
        <span class="mode-pill" id="leftModePill">Citizen</span>
      </div>

      <button class="new-chat" id="newChatBtn" type="button">+ New Chat</button>

      <div class="search-wrap">
        <input id="chatSearch" type="search" placeholder="Search chats" />
      </div>

      <div class="history" id="historyList"></div>

      <div class="profile">
        <p class="profile-name" id="profileName">Guest</p>
        <p class="profile-email" id="profileEmail">Not signed in</p>
        <div class="profile-actions">
          <button type="button" id="signInBtn">Sign in with Google</button>
          <a href="/auth/google/logout" id="logoutBtn" style="display:none">Logout</a>
        </div>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="top-left">
          <button class="menu-btn" id="menuBtn" type="button">Menu</button>
          <span>SATARK Conversation</span>
        </div>
        <div style="display:flex; gap:8px; align-items:center">
          <span class="mode-pill" id="modePill">Citizen View</span>
          <button class="drawer-toggle" id="drawerToggle" type="button">Analyst Drawer</button>
        </div>
      </header>

      <section class="thread-wrap" id="threadWrap">
        <div class="thread" id="thread"></div>
        <button id="jumpToLatestBtn" class="jump-latest-btn" type="button">Jump to latest</button>
      </section>

      <section class="agent-strip">
        <div class="agent-strip-inner" id="agentStrip"></div>
      </section>

      <section class="composer-wrap">
        <input id="fileInput" type="file" multiple hidden />
        <div class="composer">
          <textarea id="composerInput" placeholder="Paste a suspicious message, explain the call, or ask SATARK for guidance."></textarea>
          <div class="composer-actions">
            <button class="icon-btn" id="uploadBtn" type="button">Upload</button>
            <button class="icon-btn" id="micBtn" type="button">Mic</button>
            <button class="sendBtn send-btn" id="sendBtn" type="button">Send</button>
          </div>
        </div>
        <div class="composer-meta">
          <div id="attachmentSlot"></div>
          <div id="composerHint">Enter to send, Shift+Enter for new line</div>
        </div>
      </section>
    </main>
  </div>

  <aside class="drawer" id="analystDrawer">
    <h3>Latest Analyst Trace</h3>
    <pre id="analystJson">No run yet.</pre>
  </aside>

  <div id="uploadToast" class="upload-toast" aria-live="polite"></div>

  <script>
    const SESSION_STORAGE_KEY = 'satark_session_id';
    const ANALYST_MODE_KEY = 'satark_view_mode';

    const state = {
      sessionId: null,
      profile: {
        connected: false,
        email: null,
        givenName: null,
        familyName: null,
        fullName: null,
        name: 'Guest',
      },
      chats: [],
      activeChatId: null,
      selectedFiles: [],
      search: '',
      isProcessing: false,
      currentRunId: null,
      evtSource: null,
      pollTimer: null,
      agentStatus: {},
      analystMode: false,
      drawerOpen: false,
      latestPayload: null,
      speechRec: null,
      recording: false,
      mediaRecorder: null,
      mediaChunks: [],
      speechBaseText: '',
      speechFinalText: '',
      micMode: 'idle',
      messageSeq: 0,
      followThread: true,
      clarificationPulseTimer: null,
      thinkingPulseTimer: null,
      thinkingMessageId: null,
      deepIdempotencyBySource: {},
      deepRunBySource: {},
      firConsentByCase: {},
    };

    const GEMINI_REPLY_INSTRUCTION = [
      'You are SATARK AI, a citizen cyber-fraud safety assistant.',
      'Write in clear IELTS 7 to 7.5 English.',
      'When user context is already clear, do not ask unnecessary follow-up questions.',
      'If context is missing, ask at most one concise yes/no clarification at a time.',
      'Do not escalate to emergency unless user indicates money loss or sensitive data exposure.',
      'Reply format is strict:',
      '1) Provide chat_reply in 2 to 4 natural sentences.',
      '2) Then provide summary as one short neutral sentence.',
      '3) Then provide exactly 3 to 4 bullet points of safety precautions or next steps.',
      '4) Use only available evidence from user text and uploaded files.',
      '5) Do not invent urgency unless evidence supports it.',
      '6) If an attachment exists, mention that attachment directly in chat_reply.',
      'Return structured fields for chat_reply, summary, and recommended_actions.',
    ].join('\n');

    const AGENT_ORDER = ['manager', 'scam_detector', 'osint', 'audio_analyzer', 'apk_analyzer', 'golden_hour', 'google_calendar', 'google_tasks', 'google_gmail', 'google_docs'];

    const AGENT_PROGRESS_HINTS = {
      manager: 'Booting manager...',
      apk_analyzer: 'Inspecting APK structure...',
      osint: 'Searching public references...',
      scam_detector: 'Analyzing scam indicators...',
      golden_hour: 'Preparing response plan...',
    };

    let uploadToastTimer = null;

    function getSessionId() {
      if (state.sessionId) return state.sessionId;
      const existing = localStorage.getItem(SESSION_STORAGE_KEY);
      if (existing && existing.length > 8) {
        state.sessionId = existing;
        return existing;
      }
      const random = Math.random().toString(36).slice(2) + Date.now().toString(36);
      state.sessionId = 'sess_' + random;
      localStorage.setItem(SESSION_STORAGE_KEY, state.sessionId);
      return state.sessionId;
    }

    function normalizeStage(value) {
      const raw = String(value || '').trim().toLowerCase();
      if (raw === 'analysis') return 'analysis';
      if (raw === 'deep') return 'deep';
      return 'triage';
    }

    function getDeepIdempotencyKey(sourceRunId) {
      const source = String(sourceRunId || '').trim();
      if (!source) return '';
      if (!state.deepIdempotencyBySource[source]) {
        state.deepIdempotencyBySource[source] = 'deep_' + source + '_' + Math.random().toString(36).slice(2, 10);
      }
      return state.deepIdempotencyBySource[source];
    }

    function isAnalystMode() {
      try {
        const params = new URLSearchParams(window.location.search || '');
        const explicit = String(params.get('view') || params.get('mode') || '').trim().toLowerCase();
        if (explicit === 'analyst' || explicit === 'debug') return true;
      } catch (_e) {}
      try {
        return String(localStorage.getItem(ANALYST_MODE_KEY) || '').trim().toLowerCase() === 'analyst';
      } catch (_e) {
        return false;
      }
    }

    function resolveDisplayName(profile) {
      const given = String(profile && profile.givenName ? profile.givenName : '').trim();
      const family = String(profile && profile.familyName ? profile.familyName : '').trim();
      const full = String(profile && profile.fullName ? profile.fullName : '').trim();
      const email = String(profile && profile.email ? profile.email : '').trim();

      const fullFromParts = [given, family].filter(Boolean).join(' ').trim();
      if (fullFromParts) return fullFromParts;
      if (full) return full;
      if (email) {
        const local = email.split('@')[0] || email;
        return local
          .split(/[._-]+/)
          .filter(Boolean)
          .map((part) => part.charAt(0).toUpperCase() + part.slice(1))
          .join(' ') || 'User';
      }
      return 'Guest';
    }

    function classifyAttachment(fileName, mimeType) {
      const n = String(fileName || '').toLowerCase();
      const m = String(mimeType || '').toLowerCase();
      if (n.endsWith('.apk') || m === 'application/vnd.android.package-archive') return 'apk';
      if (m.startsWith('image/')) return 'image';
      if (m.startsWith('audio/')) return 'audio';
      if (m.includes('pdf') || m.includes('text') || m.includes('document')) return 'document';
      return 'file';
    }

    function normalizeAttachment(file) {
      if (!file) return null;
      return {
        id: 'att_' + Math.random().toString(36).slice(2),
        name: String(file.name || 'attachment.bin'),
        mimeType: String(file.type || 'application/octet-stream'),
        size: Number(file.size || 0),
        category: classifyAttachment(file.name, file.type),
        previewState: 'processing',
        contentBase64: null,
        file,
      };
    }

    function primeAttachmentData(attachment) {
      if (!attachment || !attachment.file || attachment.contentBase64) return;
      attachment.previewState = 'processing';
      fileToDataUrl(attachment.file)
        .then((dataUrl) => {
          if (dataUrl) attachment.contentBase64 = String(dataUrl);
          attachment.previewState = 'ready';
          renderAttachment();
        })
        .catch(() => {
          attachment.previewState = 'ready';
          renderAttachment();
        });
    }

    function toAttachmentViewModel(att) {
      const mime = String(att.mimeType || '');
      const shouldEmbedInline = mime.startsWith('image/');
      return {
        id: att.id,
        name: att.name,
        mimeType: mime,
        size: att.size,
        category: att.category,
        previewState: att.previewState || 'ready',
        contentBase64: shouldEmbedInline ? String(att.contentBase64 || '') : '',
      };
    }

    function addSelectedFiles(fileList) {
      if (!fileList || !fileList.length) return;
      const incoming = Array.from(fileList)
        .map((f) => normalizeAttachment(f))
        .filter(Boolean);
      const seen = new Set(state.selectedFiles.map((x) => `${x.name}|${x.size}|${x.mimeType}`));
      const added = [];
      for (const item of incoming) {
        const key = `${item.name}|${item.size}|${item.mimeType}`;
        if (seen.has(key)) continue;
        seen.add(key);
        state.selectedFiles.push(item);
        added.push(item);
      }
      state.selectedFiles = state.selectedFiles.slice(0, 6);
      renderAttachment();
      for (const item of added) {
        primeAttachmentData(item);
      }
    }

    function showUploadToast(message) {
      const node = document.getElementById('uploadToast');
      if (!node) return;
      node.textContent = String(message || 'Attachment added');
      node.classList.add('visible');
      if (uploadToastTimer) clearTimeout(uploadToastTimer);
      uploadToastTimer = setTimeout(() => {
        node.classList.remove('visible');
      }, 1400);
    }

    function extractPastedFiles(e) {
      const out = [];
      const dt = e && e.clipboardData;
      if (!dt) return out;

      if (dt.files && dt.files.length) {
        for (const f of Array.from(dt.files)) {
          if (f && (String(f.type || '').startsWith('image/') || String(f.type || '') === 'application/pdf')) {
            out.push(f);
          }
        }
      }

      if (!out.length && dt.items && dt.items.length) {
        for (const item of Array.from(dt.items)) {
          if (item.kind !== 'file') continue;
          const f = item.getAsFile();
          if (!f) continue;
          if (String(f.type || '').startsWith('image/') || String(f.type || '') === 'application/pdf') {
            out.push(f);
          }
        }
      }

      return out;
    }

    async function handlePastedUpload(file) {
      if (!file) return;
      addSelectedFiles([file]);
      showUploadToast(String(file.type || '').startsWith('image/') ? 'Pasted image attached' : 'Pasted file attached');
      if (!state.isProcessing) {
        document.getElementById('composerHint').textContent = 'Attachment ready. Press Send to analyze.';
      }
    }

    function handlePasteUploadEvent(e) {
      if (!e || e.__satarkPasteHandled) return;
      const files = extractPastedFiles(e);
      if (!files.length) return;

      const active = document.activeElement;
      const typingInTextField =
        active &&
        (active.tagName === 'INPUT' ||
         active.tagName === 'TEXTAREA' ||
         active.isContentEditable);

      if (typingInTextField && !e.ctrlKey && !e.metaKey) return;

      e.__satarkPasteHandled = true;
      e.preventDefault();
      for (const file of files) {
        void handlePastedUpload(file);
      }
    }

    function removeSelectedFile(id) {
      state.selectedFiles = state.selectedFiles.filter((f) => f.id !== id);
      renderAttachment();
    }

    function storageKey() {
      const id = (state.profile.email || 'guest').toLowerCase();
      return 'satark_chat_history_' + encodeURIComponent(id);
    }

    function saveChats() {
      try {
        localStorage.setItem(storageKey(), JSON.stringify(state.chats));
      } catch (_e) {}
    }

    function loadChats() {
      state.deepIdempotencyBySource = {};
      state.deepRunBySource = {};
      try {
        const raw = localStorage.getItem(storageKey());
        state.chats = raw ? JSON.parse(raw) : [];
        if (!Array.isArray(state.chats)) state.chats = [];
      } catch (_e) {
        state.chats = [];
      }
      for (const chat of state.chats) {
        if (!chat || !Array.isArray(chat.messages)) continue;
        for (const message of chat.messages) {
          if (!message.id) message.id = nextMessageId();
          if (message.clarificationPending === undefined) message.clarificationPending = false;
          if (message.clarificationAnswered === undefined) message.clarificationAnswered = false;
          if (message.clarificationSelectedId === undefined) message.clarificationSelectedId = null;
          if (message.clarificationSelectedLabel === undefined) message.clarificationSelectedLabel = null;
          if (message.clarificationPendingPhase === undefined) message.clarificationPendingPhase = 0;
          if (message.clarificationPendingStartedAt === undefined) message.clarificationPendingStartedAt = null;
          if (message.analysisStage === undefined) message.analysisStage = null;
          if (message.caseId === undefined) message.caseId = null;
          if (message.sourceRunId === undefined) message.sourceRunId = null;
          if (message.contractVersion === undefined) message.contractVersion = null;
          if (message.analysisStageVersion === undefined) message.analysisStageVersion = null;
          if (message.deepReasonCode === undefined) message.deepReasonCode = null;
          if (message.eligibleForDeep === undefined) message.eligibleForDeep = false;
          if (message.deepRunId === undefined) message.deepRunId = null;
          if (message.deepRunState === undefined) message.deepRunState = null;
          if (message.idempotentReplay === undefined) message.idempotentReplay = false;

          const sourceRun = String(message.runId || '').trim();
          const deepRun = String(message.deepRunId || '').trim();
          if (sourceRun && deepRun) {
            state.deepRunBySource[sourceRun] = deepRun;
          }
          const stage = normalizeStage(message.analysisStage);
          if (stage === 'deep') {
            const src = String(message.sourceRunId || '').trim();
            const ownRun = String(message.runId || '').trim();
            if (src && ownRun) state.deepRunBySource[src] = ownRun;
          }
        }
      }
      if (!state.chats.length) {
        const starter = createChat('New SATARK chat');
        state.chats = [starter];
        state.activeChatId = starter.id;
        saveChats();
      }
      if (!state.activeChatId || !state.chats.some((c) => c.id === state.activeChatId)) {
        state.activeChatId = state.chats[0].id;
      }
    }

    function createChat(title) {
      const now = new Date().toISOString();
      return {
        id: 'chat_' + Math.random().toString(36).slice(2) + Date.now().toString(36),
        title: title || 'New chat',
        createdAt: now,
        updatedAt: now,
        messages: [],
      };
    }

    function getActiveChat() {
      return state.chats.find((c) => c.id === state.activeChatId) || null;
    }

    function updateChat(chat) {
      const idx = state.chats.findIndex((c) => c.id === chat.id);
      if (idx >= 0) state.chats[idx] = chat;
      chat.updatedAt = new Date().toISOString();
      state.chats.sort((a, b) => String(b.updatedAt).localeCompare(String(a.updatedAt)));
      saveChats();
    }

    function nextMessageId() {
      state.messageSeq += 1;
      return 'msg_' + Date.now().toString(36) + '_' + state.messageSeq.toString(36);
    }

    function updateMessageById(messageId, patch = {}) {
      const chat = getActiveChat();
      if (!chat) return false;
      const idx = (chat.messages || []).findIndex((m) => m && m.id === messageId);
      if (idx < 0) return false;
      chat.messages[idx] = {
        ...chat.messages[idx],
        ...patch,
      };
      updateChat(chat);
      render();
      return true;
    }

    function getMessageById(messageId) {
      const chat = getActiveChat();
      if (!chat) return null;
      return (chat.messages || []).find((m) => m && m.id === messageId) || null;
    }

    async function triggerDeepAnalysisForMessage(messageId) {
      if (!messageId || state.isProcessing) return;
      const target = getMessageById(messageId);
      if (!target) return;

      const sourceRunId = String(target.runId || '').trim();
      if (!sourceRunId) return;

      const caseId = String(target.caseId || '').trim() || null;
      const idempotencyKey = getDeepIdempotencyKey(sourceRunId);

      state.isProcessing = true;
      document.getElementById('composerHint').textContent = 'Starting deep analysis for this case...';
      updateMessageById(messageId, {
        deepRunState: 'running',
      });

      let deepMessageId = null;
      try {
        const res = await fetch('/api/analyze/deep', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Idempotency-Key': idempotencyKey,
          },
          body: JSON.stringify({
            source_run_id: sourceRunId,
            generate_report: true,
            trigger_mcp_actions: false,
            stream: true,
          }),
        });

        if (!res.ok) throw new Error('Could not start deep analysis');

        const ack = await res.json();
        const deepRunId = String(ack.run_id || '').trim();
        if (!deepRunId) throw new Error('Missing deep run id');

        state.deepRunBySource[sourceRunId] = deepRunId;
        updateMessageById(messageId, {
          deepRunId,
          deepRunState: 'running',
        });

        const replayed = Boolean(ack.idempotent_replay);
        const chat = getActiveChat();
        const existingDeep = replayed && chat
          ? (chat.messages || []).find((m) => m && String(m.runId || '').trim() === deepRunId && normalizeStage(m.analysisStage) === 'deep')
          : null;

        if (existingDeep && existingDeep.id) {
          deepMessageId = String(existingDeep.id);
          updateMessageById(deepMessageId, {
            text: 'Resuming an existing deep analysis run for this case.',
            flags: [{ text: 'Deep run resumed', level: 'warn' }],
            idempotentReplay: true,
            deepRunState: 'running',
          });
        } else {
          deepMessageId = addMessage(
            'assistant',
            replayed ? 'Resuming an existing deep analysis run for this case.' : 'Deep analysis started. I will post refined findings shortly.',
            {
              runId: deepRunId,
              caseId: String(ack.case_id || caseId || '').trim() || caseId,
              analysisStage: 'deep',
              sourceRunId,
              contractVersion: String(ack.contract_version || '').trim() || null,
              analysisStageVersion: Number(ack.analysis_stage_version || 0) || null,
              eligibleForDeep: false,
              deepReason: String(ack.deep_reason || 'Deep analysis accepted for this case.').trim(),
              deepReasonCode: String(ack.deep_reason_code || 'DEEP_ACCEPTED').trim(),
              idempotentReplay: replayed,
              flags: replayed ? [{ text: 'Deep run resumed', level: 'warn' }] : [{ text: 'Deep run started', level: 'warn' }],
              steps: [],
            },
          );
        }

        state.currentRunId = deepRunId;
        startStream(deepRunId);

        const result = await waitForResult(deepRunId);
        state.latestPayload = result;
        const assistant = buildAssistantPayload(result || {});

        if (!assistant.ok) {
          updateMessageById(String(deepMessageId || ''), {
            text: assistant.error || 'Deep analysis response is incomplete. Please retry.',
            flags: [{ text: 'Retry needed', level: 'warn' }],
            steps: [],
          });
        } else {
          updateMessageById(String(deepMessageId || ''), {
            text: assistant.text,
            steps: assistant.steps,
            flags: assistant.flags,
            confidenceNote: assistant.confidenceNote,
            evidenceNarrative: assistant.evidenceNarrative,
            uncertaintyNote: assistant.uncertaintyNote,
            technicalDetails: assistant.technicalDetails,
            clarification: assistant.clarification,
            runId: deepRunId,
            caseId: assistant.caseId,
            analysisStage: assistant.analysisStage,
            sourceRunId: assistant.sourceRunId || sourceRunId,
            contractVersion: assistant.contractVersion,
            analysisStageVersion: assistant.analysisStageVersion,
            eligibleForDeep: assistant.eligibleForDeep,
            deepReason: assistant.deepReason,
            deepReasonCode: assistant.deepReasonCode,
            deepAnalysisUrl: assistant.deepAnalysisUrl,
            integrationStatus: assistant.integrationStatus,
            idempotentReplay: replayed,
          });
        }

        updateMessageById(messageId, {
          deepRunState: 'done',
          deepRunId,
          eligibleForDeep: false,
          deepReason: 'Deep analysis completed for this case.',
          deepReasonCode: 'DEEP_ALREADY_EXECUTED',
        });
      } catch (_err) {
        updateMessageById(messageId, {
          deepRunState: 'failed',
        });
        if (deepMessageId) {
          updateMessageById(String(deepMessageId), {
            text: 'I could not start deep analysis right now. Please try again shortly.',
            flags: [{ text: 'Deep analysis unavailable', level: 'warn' }],
            steps: [],
          });
        } else {
          addMessage('assistant', 'I could not start deep analysis right now. Please try again shortly.');
        }
      } finally {
        state.isProcessing = false;
        document.getElementById('composerHint').textContent = 'Enter to send, Shift+Enter for new line';
        closeStreamAndPoll();
        render();
      }
    }

    function getClarificationPendingLabel(phase) {
      const labels = [
        'Reading screenshot',
        'Checking text in image',
        'Preparing next-step guidance',
      ];
      const idx = Math.max(0, Number(phase || 0)) % labels.length;
      return labels[idx];
    }

    function stopClarificationPulse() {
      if (!state.clarificationPulseTimer) return;
      clearInterval(state.clarificationPulseTimer);
      state.clarificationPulseTimer = null;
    }

    function startClarificationPulse(messageId) {
      stopClarificationPulse();
      state.clarificationPulseTimer = setInterval(() => {
        const chat = getActiveChat();
        if (!chat) {
          stopClarificationPulse();
          return;
        }
        const target = (chat.messages || []).find((m) => m && m.id === messageId);
        if (!target || !target.clarificationPending) {
          stopClarificationPulse();
          return;
        }
        updateMessageById(messageId, {
          clarificationPendingPhase: (Number(target.clarificationPendingPhase || 0) + 1) % 3,
        });
      }, 900);
    }

    function stopThinkingPulse() {
      if (!state.thinkingPulseTimer) return;
      clearInterval(state.thinkingPulseTimer);
      state.thinkingPulseTimer = null;
      state.thinkingMessageId = null;
    }

    function startThinkingPulse(messageId) {
      stopThinkingPulse();
      state.thinkingMessageId = messageId;
      const labels = [
        'SATARK AI is analyzing your case.',
        'SATARK AI is checking risk signals..',
        'SATARK AI is preparing next steps...',
      ];
      state.thinkingPulseTimer = setInterval(() => {
        const chat = getActiveChat();
        if (!chat) {
          stopThinkingPulse();
          return;
        }
        const target = (chat.messages || []).find((m) => m && m.id === messageId);
        if (!target) {
          stopThinkingPulse();
          return;
        }
        const phase = Number(target.clarificationPendingPhase || 0);
        updateMessageById(messageId, {
          text: labels[phase % labels.length],
          clarificationPendingPhase: (phase + 1) % labels.length,
        });
      }, 850);
    }

    function isNearThreadBottom() {
      const wrap = document.getElementById('threadWrap');
      if (!wrap) return true;
      const remaining = wrap.scrollHeight - (wrap.scrollTop + wrap.clientHeight);
      return remaining < 72;
    }

    function updateJumpToLatestButton() {
      const btn = document.getElementById('jumpToLatestBtn');
      if (!btn) return;
      btn.classList.toggle('visible', !state.followThread);
    }

    function scrollThreadToLatest(force = false) {
      const wrap = document.getElementById('threadWrap');
      if (!wrap) return;
      if (force || state.followThread) {
        wrap.scrollTop = wrap.scrollHeight;
        state.followThread = true;
      }
      updateJumpToLatestButton();
    }

    function formatTime(iso) {
      if (!iso) return '';
      try {
        return new Date(iso).toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
      } catch (_e) {
        return '';
      }
    }

    function textPreview(text, maxLen = 90) {
      const clean = String(text || '').replace(/\s+/g, ' ').trim();
      if (clean.length <= maxLen) return clean;
      return clean.slice(0, maxLen - 1) + '...';
    }

    function makeTitleFromText(text) {
      const src = String(text || '').toLowerCase();
      if (src.includes('kyc')) return 'Suspicious KYC SMS';
      if (src.includes('otp') && (src.includes('lost') || src.includes('debited'))) return 'OTP shared and money lost';
      if (src.includes('upi') && src.includes('lost')) return 'UPI money lost case';
      if (src.includes('lottery') || src.includes('prize')) return 'Lottery message check';
      if (src.includes('bank')) return 'Bank message check';
      const words = String(text || '').replace(/\s+/g, ' ').trim().split(' ').slice(0, 5).join(' ');
      return words ? words.charAt(0).toUpperCase() + words.slice(1) : 'New SATARK chat';
    }

    function sanitizeCitizenText(text) {
      let out = String(text || '').trim();
      if (!out) return out;
      out = out.replace(/\s{2,}/g, ' ').trim();
      return out;
    }

    function renderHistory() {
      const host = document.getElementById('historyList');
      host.innerHTML = '';
      const query = state.search.toLowerCase().trim();
      const items = state.chats.filter((chat) => {
        if (!query) return true;
        const blob = [chat.title, ...(chat.messages || []).map((m) => m.text || '')].join(' ').toLowerCase();
        return blob.includes(query);
      });

      if (!items.length) {
        const empty = document.createElement('div');
        empty.className = 'chat-item';
        empty.innerHTML = '<p class="title">No chats found</p><p class="meta">Try another keyword.</p>';
        host.appendChild(empty);
        return;
      }

      for (const chat of items) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'chat-item' + (chat.id === state.activeChatId ? ' active' : '');
        const last = (chat.messages || []).slice(-1)[0];
        btn.innerHTML = `
          <p class="title">${escapeHtml(chat.title || 'Untitled')}</p>
          <p class="meta">${escapeHtml(formatTime(chat.updatedAt || chat.createdAt))}</p>
          <p class="snippet">${escapeHtml(textPreview(last ? last.text : 'No messages yet'))}</p>
        `;
        btn.addEventListener('click', () => {
          state.activeChatId = chat.id;
          closeSidebarOnMobile();
          render();
        });
        host.appendChild(btn);
      }
    }

    function renderThread() {
      const thread = document.getElementById('thread');
      const chat = getActiveChat();
      thread.innerHTML = '';
      if (!chat || !chat.messages.length) {
        const starter = document.createElement('div');
        starter.className = 'starter';
        starter.innerHTML = [
          '<strong>Chat with SATARK AI</strong>',
          'Paste suspicious text, attach evidence, or dictate by mic.',
          'You will get one clear response with simple explanation and practical steps.',
        ].join('<br>');
        thread.appendChild(starter);
        state.followThread = true;
        updateJumpToLatestButton();
        return;
      }

      for (const msg of chat.messages) {
        const row = document.createElement('div');
        row.className = 'msg ' + (msg.role === 'user' ? 'user' : 'bot');
        row.dataset.messageId = String(msg.id || '');

        const bubble = document.createElement('div');
        bubble.className = 'bubble ' + (msg.role === 'user' ? 'user' : 'bot');

        const head = document.createElement('div');
        head.className = 'bubble-head';
        const label = msg.role === 'user' ? state.profile.name : 'SATARK AI';
        head.innerHTML = `<span>${escapeHtml(label)}</span><span>${escapeHtml(formatTime(msg.ts))}</span>`;

        const body = document.createElement('div');
        body.className = 'bubble-body';
        const text = msg.role === 'assistant'
          ? String(msg.text || '').trim()
          : sanitizeCitizenText(msg.text || '');
        body.innerHTML = text ? `<p>${renderTextWithLinks(text)}</p>` : '<p>(No text)</p>';

        const hasClarification = (
          msg.role === 'assistant'
          && msg.clarification
          && typeof msg.clarification === 'object'
          && Array.isArray(msg.clarification.options)
        );

        if (hasClarification) {
          const wrap = document.createElement('div');
          wrap.className = 'clarification-wrap';

          const question = document.createElement('p');
          question.className = 'clarification-question';
          question.textContent = String(msg.clarification.question_text || 'Did you tap the link?');
          wrap.appendChild(question);

          const why = document.createElement('p');
          why.className = 'clarification-why';
          why.textContent = String(msg.clarification.why_needed || 'This changes urgency and next steps.');
          wrap.appendChild(why);

          if (msg.clarificationSelectedLabel) {
            const selected = document.createElement('p');
            selected.className = 'clarification-selected';
            selected.textContent = `Selected: ${String(msg.clarificationSelectedLabel)}`;
            wrap.appendChild(selected);
          }

          const options = document.createElement('div');
          options.className = 'clarification-options';
          for (const option of msg.clarification.options.slice(0, 6)) {
            const optionId = String(option.id || '').trim().toLowerCase();
            const optionLabel = String(option.label || option.id || 'Option').trim();
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'clarification-btn';
            if (msg.clarificationSelectedId && optionId === String(msg.clarificationSelectedId).toLowerCase()) {
              btn.classList.add('selected');
            }
            btn.textContent = optionLabel;
            btn.disabled = state.isProcessing || !!msg.clarificationPending || !!msg.clarificationAnswered;
            btn.addEventListener('click', () => {
              handleClarificationChoice(String(msg.id || ''), {
                id: optionId,
                label: optionLabel,
              });
            });
            options.appendChild(btn);
          }
          wrap.appendChild(options);

          if (msg.clarificationPending) {
            const pending = document.createElement('div');
            pending.className = 'clarification-pending';
            const bar = document.createElement('div');
            bar.className = 'clarification-pending-bar';
            const label = document.createElement('p');
            label.className = 'clarification-pending-text';
            label.textContent = getClarificationPendingLabel(msg.clarificationPendingPhase || 0);
            pending.appendChild(bar);
            pending.appendChild(label);
            wrap.appendChild(pending);
          }

          body.appendChild(wrap);
        }

        if (msg.role === 'assistant' && hasClarification) {
          const whyRows = [];
          if (msg.confidenceNote) whyRows.push(String(msg.confidenceNote));
          if (msg.evidenceNarrative) whyRows.push(String(msg.evidenceNarrative));
          if (msg.uncertaintyNote) whyRows.push(String(msg.uncertaintyNote));
          if (Array.isArray(msg.technicalDetails) && msg.technicalDetails.length) {
            for (const item of msg.technicalDetails) {
              whyRows.push(String(item));
            }
          }
          if (whyRows.length) {
            const details = document.createElement('details');
            details.className = 'msg-technical-details clarification-reasoning';
            details.innerHTML = '<summary>Why SATARK is asking</summary>';
            const ul = document.createElement('ul');
            for (const row of whyRows) {
              const li = document.createElement('li');
              li.textContent = row;
              ul.appendChild(li);
            }
            details.appendChild(ul);
            body.appendChild(details);
          }
        } else {
          if (msg.role === 'assistant' && msg.confidenceNote) {
            const note = document.createElement('p');
            note.className = 'msg-meta-note';
            note.textContent = String(msg.confidenceNote);
            body.appendChild(note);
          }

          if (msg.role === 'assistant' && msg.evidenceNarrative) {
            const ev = document.createElement('p');
            ev.className = 'msg-meta-note';
            ev.textContent = String(msg.evidenceNarrative);
            body.appendChild(ev);
          }

          if (msg.role === 'assistant' && msg.uncertaintyNote) {
            const un = document.createElement('p');
            un.className = 'msg-meta-note';
            un.textContent = String(msg.uncertaintyNote);
            body.appendChild(un);
          }

          if (msg.role === 'assistant' && Array.isArray(msg.technicalDetails) && msg.technicalDetails.length) {
            const details = document.createElement('details');
            details.className = 'msg-technical-details';
            details.innerHTML = '<summary>Technical details</summary>';
            const ul = document.createElement('ul');
            for (const item of msg.technicalDetails) {
              const li = document.createElement('li');
              li.textContent = String(item);
              ul.appendChild(li);
            }
            details.appendChild(ul);
            body.appendChild(details);
          }
        }

        if (msg.role === 'assistant' && Array.isArray(msg.steps) && msg.steps.length) {
          const list = document.createElement('ol');
          list.className = 'assistant-steps';
          for (const step of msg.steps.slice(0, 4)) {
            const li = document.createElement('li');
            li.textContent = sanitizeCitizenText(step);
            list.appendChild(li);
          }
          body.appendChild(list);
        }

        if (msg.role === 'assistant' && Array.isArray(msg.flags) && msg.flags.length) {
          const flags = document.createElement('div');
          flags.className = 'assistant-flags';
          for (const f of msg.flags) {
            const item = document.createElement('span');
            item.className = 'flag ' + (f.level || 'warn');
            item.textContent = f.text;
            flags.appendChild(item);
          }
          body.appendChild(flags);
        }

        if (msg.role === 'assistant' && msg.integrationStatus && typeof msg.integrationStatus === 'object' && msg.integrationStatus.visible === true) {
          const panel = document.createElement('div');
          panel.className = 'integration-panel';

          const head = document.createElement('p');
          head.className = 'integration-panel-head';
          head.textContent = 'Workflow Integrations';
          panel.appendChild(head);

          const grid = document.createElement('div');
          grid.className = 'integration-grid';
          const entries = [
            { label: 'Google Calendar', key: 'calendarCreated', pendingKey: 'calendarAttempted', errKey: 'calendarError' },
            { label: 'Google Tasks', key: 'taskCreated', pendingKey: 'taskAttempted', errKey: 'taskError' },
            { label: 'Google Docs', key: 'docCreated', pendingKey: null, errKey: 'docError' },
            { label: 'Gmail Draft', key: 'gmailDraftCreated', pendingKey: null, errKey: 'gmailError' },
          ];

          for (const entry of entries) {
            const item = document.createElement('div');
            item.className = 'integration-item';

            const title = document.createElement('p');
            title.className = 'integration-item-title';
            title.textContent = entry.label;
            item.appendChild(title);

            const status = document.createElement('p');
            status.className = 'integration-item-status';
            const created = msg.integrationStatus[entry.key] === true;
            const attempted = entry.pendingKey ? msg.integrationStatus[entry.pendingKey] === true : false;
            const errorText = String(msg.integrationStatus[entry.errKey] || '').trim();
            if (created) {
              status.classList.add('ok');
              status.textContent = 'Created';
            } else if (attempted) {
              status.classList.add('warn');
              status.textContent = errorText ? `Attempted (${errorText})` : 'Attempted';
            } else {
              status.textContent = errorText ? `Not created (${errorText})` : 'Not created';
            }

            item.appendChild(status);
            grid.appendChild(item);
          }

          panel.appendChild(grid);

          const links = [];
          if (msg.integrationStatus.calendarUrl) links.push({ label: 'Open Calendar', href: msg.integrationStatus.calendarUrl });
          if (msg.integrationStatus.taskUrl) links.push({ label: 'Open Tasks', href: msg.integrationStatus.taskUrl });
          if (msg.integrationStatus.docUrl) links.push({ label: 'Open FIR Doc', href: msg.integrationStatus.docUrl });
          if (msg.integrationStatus.gmailDraftUrl) links.push({ label: 'Open Gmail Draft', href: msg.integrationStatus.gmailDraftUrl });

          if (links.length) {
            const linksWrap = document.createElement('div');
            linksWrap.className = 'integration-links';
            for (const link of links) {
              const anchor = document.createElement('a');
              anchor.className = 'integration-link';
              anchor.href = String(link.href);
              anchor.target = '_blank';
              anchor.rel = 'noopener noreferrer';
              anchor.textContent = String(link.label);
              linksWrap.appendChild(anchor);
            }
            panel.appendChild(linksWrap);
          }

          body.appendChild(panel);
        }

        if (msg.role === 'assistant' && isAnalystMode() && (msg.analysisStage || msg.caseId || msg.runId)) {
          const strip = document.createElement('div');
          strip.className = 'stage-meta-strip';

          const stage = normalizeStage(msg.analysisStage);
          const stageChip = document.createElement('span');
          stageChip.className = 'stage-chip';
          stageChip.textContent = stage;
          strip.appendChild(stageChip);

          if (msg.caseId) {
            const caseNode = document.createElement('span');
            caseNode.textContent = `Case ${String(msg.caseId)}`;
            strip.appendChild(caseNode);
          }

          if (msg.sourceRunId) {
            const sourceNode = document.createElement('span');
            sourceNode.textContent = `Linked to ${String(msg.sourceRunId)}`;
            strip.appendChild(sourceNode);
          }

          if (msg.contractVersion) {
            const contractNode = document.createElement('span');
            contractNode.textContent = `Contract ${String(msg.contractVersion)}`;
            strip.appendChild(contractNode);
          }

          body.appendChild(strip);
        }

        const canTriggerDeep = (
          msg.role === 'assistant'
          && normalizeStage(msg.analysisStage) === 'triage'
          && Boolean(msg.eligibleForDeep)
          && !msg.clarification
          && String(msg.runId || '').trim()
        );

        if (canTriggerDeep) {
          const actionWrap = document.createElement('div');
          actionWrap.className = 'deep-action-wrap';
          const button = document.createElement('button');
          button.type = 'button';
          button.className = 'deep-action-btn';

          const stateLabel = String(msg.deepRunState || '').trim().toLowerCase();
          if (stateLabel === 'running') {
            button.textContent = 'Deep analysis running...';
            button.disabled = true;
          } else if (stateLabel === 'done') {
            button.textContent = 'Deep analysis completed';
            button.disabled = true;
          } else {
            button.textContent = 'Run deep analysis';
            button.disabled = state.isProcessing;
            button.addEventListener('click', () => {
              triggerDeepAnalysisForMessage(String(msg.id || ''));
            });
          }

          actionWrap.appendChild(button);

          if (msg.deepReason) {
            const note = document.createElement('span');
            note.className = 'msg-meta-note';
            note.textContent = String(msg.deepReason);
            actionWrap.appendChild(note);
          }
          body.appendChild(actionWrap);
        }

        if (Array.isArray(msg.attachments) && msg.attachments.length) {
          const wrap = document.createElement('div');
          wrap.className = 'msg-attachments';
          for (const attachment of msg.attachments) {
            const card = document.createElement('div');
            card.className = 'msg-attachment-card';
            const dataUrl = String(attachment.contentBase64 || '').trim();
            const isInlineImage = String(attachment.category || '').toLowerCase() === 'image' && dataUrl.startsWith('data:image/');
            if (isInlineImage) {
              const img = document.createElement('img');
              img.className = 'msg-attachment-preview';
              img.loading = 'lazy';
              img.alt = String(attachment.name || 'uploaded image');
              img.src = dataUrl;
              card.appendChild(img);
            }
            const sizeKb = Math.max(1, Math.round(Number(attachment.size || 0) / 1024));
            const meta = document.createElement('div');
            meta.className = 'msg-attachment-meta';
            meta.innerHTML = `
              <p class="msg-attachment-name">${escapeHtml(attachment.name || 'attachment')}</p>
              <p class="msg-attachment-sub">${escapeHtml(String(attachment.mimeType || 'application/octet-stream'))} | ${sizeKb} KB | ${escapeHtml(String(attachment.previewState || 'uploaded'))}</p>
            `;
            const badge = document.createElement('span');
            badge.className = 'attachment-badge';
            badge.textContent = String(attachment.category || 'file');
            const footer = document.createElement('div');
            footer.className = 'msg-attachment-footer';
            footer.appendChild(meta);
            footer.appendChild(badge);
            card.appendChild(footer);
            wrap.appendChild(card);
          }
          body.appendChild(wrap);
        }

        bubble.appendChild(head);
        bubble.appendChild(body);
        row.appendChild(bubble);
        thread.appendChild(row);
      }

      requestAnimationFrame(() => {
        scrollThreadToLatest(false);
      });
    }

    function renderAgentStrip() {
      const strip = document.getElementById('agentStrip');
      strip.innerHTML = '';
      const keys = Object.keys(state.agentStatus);
      if (!state.isProcessing || !keys.length) {
        strip.style.display = 'none';
        return;
      }

      strip.style.display = 'flex';
      for (const name of AGENT_ORDER) {
        if (!state.agentStatus[name]) continue;
        const s = state.agentStatus[name];
        const chip = document.createElement('div');
        chip.className = 'agent-chip ' + (s.state || 'idle');
        const label = name.replaceAll('_', ' ');
        chip.innerHTML = `<span class="agent-dot"></span><span>${escapeHtml(label)}: ${escapeHtml(s.label || s.state)}</span>`;
        strip.appendChild(chip);
      }
    }

    function renderProfile() {
      document.getElementById('profileName').textContent = state.profile.name;
      document.getElementById('profileEmail').textContent = state.profile.email || 'Not signed in';
      document.getElementById('signInBtn').style.display = state.profile.connected ? 'none' : 'inline-block';
      document.getElementById('logoutBtn').style.display = state.profile.connected ? 'inline-block' : 'none';
    }

    function renderAttachment() {
      const slot = document.getElementById('attachmentSlot');
      slot.innerHTML = '';
      if (!state.selectedFiles.length) return;
      for (const meta of state.selectedFiles) {
        const pill = document.createElement('div');
        pill.className = 'attachment-pill';
        const kb = Math.max(1, Math.round(meta.size / 1024));
        pill.innerHTML = `<span>${escapeHtml(meta.name)} (${escapeHtml(meta.mimeType)}) | ${kb} KB | ${escapeHtml(meta.previewState || 'ready')}</span>`;
        const clear = document.createElement('button');
        clear.type = 'button';
        clear.textContent = 'Remove';
        clear.addEventListener('click', () => removeSelectedFile(meta.id));
